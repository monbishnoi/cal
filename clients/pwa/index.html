<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#101014">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cal">
  <meta name="format-detection" content="telephone=no">
  <title>Cal</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      color-scheme: dark;
      --bg: #101014;
      --surface: #18191d;
      --surface-2: #22242a;
      --surface-3: #2c2f36;
      --text: #f4f0ea;
      --muted: #aaa7a1;
      --subtle: #74716c;
      --border: rgba(244, 240, 234, 0.12);
      --user: #176b87;
      --assistant: #24262c;
      --accent: #d6a45f;
      --accent-2: #58c7a5;
      --danger: #f07167;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
    }

    #app {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      height: 100vh;
      height: 100dvh;
      background:
        linear-gradient(180deg, rgba(214, 164, 95, 0.08), transparent 220px),
        var(--bg);
    }

    #app.has-strands {
      grid-template-rows: auto auto minmax(0, 1fr) auto;
    }

    .topbar {
      position: relative;
      z-index: 4;
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      min-height: calc(56px + var(--safe-top));
      padding: var(--safe-top) calc(12px + var(--safe-right)) 0 calc(12px + var(--safe-left));
      background: rgba(16, 16, 20, 0.84);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .brand {
      min-width: 0;
      text-align: center;
    }

    .brand h1 {
      font-size: 17px;
      font-weight: 650;
      letter-spacing: 0;
      line-height: 1.2;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 100%;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--subtle);
    }

    .status-dot.online {
      background: var(--accent-2);
      box-shadow: 0 0 12px rgba(88, 199, 165, 0.8);
    }

    .status-dot.busy {
      background: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }

    .status-dot.error {
      background: var(--danger);
    }

    @keyframes pulse {
      50% {
        opacity: 0.45;
        transform: scale(0.82);
      }
    }

    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
    }

    .icon-button:active {
      background: rgba(244, 240, 234, 0.08);
      color: var(--text);
    }

    .icon-button svg {
      width: 21px;
      height: 21px;
      stroke-width: 2;
    }

    .strand-tabs {
      z-index: 3;
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 42px;
      padding: 6px calc(12px + var(--safe-right)) 6px calc(12px + var(--safe-left));
      overflow-x: auto;
      background: rgba(16, 16, 20, 0.82);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      scrollbar-width: none;
    }

    .strand-tabs[hidden] {
      display: none;
    }

    .strand-tabs::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .tabs-list {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .session-tab {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-width: 74px;
      height: 30px;
      padding: 0 8px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      white-space: nowrap;
    }

    .session-tab.active {
      border-color: var(--border);
      background: var(--surface);
      color: var(--text);
    }

    .session-tab .tab-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 13px;
      line-height: 1;
    }

    .tab-dot {
      width: 7px;
      height: 7px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--accent-2);
      box-shadow: 0 0 9px rgba(88, 199, 165, 0.65);
    }

    .session-tab.working .tab-dot {
      background: var(--accent);
      box-shadow: none;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .close-tab {
      display: none;
      place-items: center;
      width: 18px;
      height: 18px;
      margin-right: -3px;
      border-radius: 6px;
      background: transparent;
      color: var(--subtle);
      font-size: 17px;
      line-height: 1;
    }

    .session-tab:not(.permanent):hover .close-tab {
      display: grid;
    }

    .close-tab:active {
      background: rgba(244, 240, 234, 0.1);
      color: var(--text);
    }

    .add-strand {
      flex: 0 0 auto;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
      font-size: 20px;
      line-height: 1;
    }

    .add-strand:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .messages {
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      padding: 18px calc(14px + var(--safe-right)) 18px calc(14px + var(--safe-left));
      scroll-padding-bottom: 24px;
    }

    .messages::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .empty {
      min-height: 100%;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 14px;
      padding: 40px 18px;
      color: var(--muted);
      text-align: center;
    }

    .empty-mark {
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--accent);
      box-shadow: var(--shadow);
      font-size: 22px;
      font-weight: 700;
    }

    .empty h2 {
      color: var(--text);
      font-size: 22px;
      font-weight: 680;
      letter-spacing: 0;
    }

    .empty p {
      max-width: 300px;
      font-size: 14px;
      line-height: 1.45;
    }

    .message {
      display: flex;
      margin: 0 0 12px;
      animation: rise 0.18s ease-out;
    }

    .chat-session {
      display: none;
    }

    .chat-session.active {
      display: block;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.assistant {
      justify-content: flex-start;
    }

    .bubble {
      max-width: min(86%, 760px);
      padding: 11px 13px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      line-height: 1.52;
      overflow-wrap: anywhere;
      white-space: normal;
      user-select: text;
      -webkit-user-select: text;
    }

    .message.user .bubble {
      background: var(--user);
      color: white;
      border-color: rgba(255, 255, 255, 0.12);
      border-bottom-right-radius: 3px;
    }

    .message.assistant .bubble {
      background: var(--assistant);
      color: var(--text);
      border-bottom-left-radius: 3px;
    }

    .message.pending .bubble {
      color: var(--muted);
    }

    .message.pre-reset {
      opacity: 0.55;
    }

    .session-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
      color: var(--muted);
      font-size: 12px;
    }

    .session-divider::before,
    .session-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .bubble p,
    .bubble ul,
    .bubble ol,
    .bubble pre,
    .bubble blockquote {
      margin: 0 0 0.75em;
    }

    .bubble :last-child {
      margin-bottom: 0;
    }

    .bubble ul,
    .bubble ol {
      padding-left: 1.25em;
    }

    .bubble li {
      margin-bottom: 0.3em;
    }

    .bubble h1,
    .bubble h2,
    .bubble h3 {
      margin: 0.9em 0 0.45em;
      color: #ffe2b8;
      font-weight: 680;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .bubble h1:first-child,
    .bubble h2:first-child,
    .bubble h3:first-child {
      margin-top: 0;
    }

    .bubble h1 { font-size: 1.25em; }
    .bubble h2 { font-size: 1.14em; }
    .bubble h3 { font-size: 1.05em; }

    .bubble a {
      color: #88d8c3;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .bubble code {
      font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
      font-size: 0.9em;
      padding: 0.12em 0.35em;
      border-radius: 5px;
      background: rgba(0, 0, 0, 0.26);
      color: #f8d49a;
    }

    .bubble pre {
      overflow-x: auto;
      padding: 11px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.28);
    }

    .bubble pre code {
      padding: 0;
      background: transparent;
      white-space: pre;
    }

    .bubble blockquote {
      padding-left: 11px;
      border-left: 3px solid var(--accent);
      color: var(--muted);
    }

    .table-wrap {
      max-width: 100%;
      overflow-x: auto;
      margin: 0 0 0.75em;
      border: 1px solid var(--border);
      border-radius: 8px;
      -webkit-overflow-scrolling: touch;
    }

    .bubble table {
      min-width: 100%;
      border-collapse: collapse;
      font-size: 0.92em;
      white-space: nowrap;
    }

    .bubble th,
    .bubble td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    .bubble th {
      background: rgba(214, 164, 95, 0.12);
      color: #ffe2b8;
      font-weight: 650;
    }

    .bubble tr:last-child td {
      border-bottom: 0;
    }

    .task-list {
      list-style: none;
      padding-left: 0 !important;
    }

    .task-list li {
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
    }

    .task-box {
      display: inline-grid;
      place-items: center;
      width: 16px;
      height: 16px;
      margin-top: 3px;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--accent-2);
      font-size: 12px;
      line-height: 1;
    }

    .composer {
      z-index: 5;
      padding: 10px calc(12px + var(--safe-right)) calc(10px + var(--safe-bottom)) calc(12px + var(--safe-left));
      background: rgba(16, 16, 20, 0.9);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .composer-shell {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) 44px;
      align-items: end;
      gap: 8px;
      max-width: 900px;
      margin: 0 auto;
    }

    .attach {
      width: 44px;
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .attach:active {
      background: var(--surface-2);
      color: var(--text);
    }

    .attach:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .attach svg {
      width: 21px;
      height: 21px;
    }

    .file-input {
      display: none;
    }

    .attachment-preview {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr) 34px;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(244, 240, 234, 0.05);
    }

    .attachment-preview[hidden] {
      display: none;
    }

    .attachment-preview img,
    .message-image {
      width: 54px;
      height: 54px;
      border-radius: 7px;
      object-fit: cover;
      background: var(--surface-2);
    }

    .attachment-name {
      min-width: 0;
      color: var(--text);
      font-size: 13px;
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .attachment-size {
      margin-top: 2px;
      color: var(--subtle);
      font-size: 11px;
      line-height: 1.2;
    }

    .remove-attachment {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-size: 22px;
      line-height: 1;
    }

    .remove-attachment:active {
      background: rgba(244, 240, 234, 0.08);
      color: var(--text);
    }

    .message-attachment {
      display: grid;
      gap: 8px;
    }

    .message-attachment .message-image {
      width: min(220px, 100%);
      height: auto;
      max-height: 260px;
      aspect-ratio: auto;
    }

    .message-text {
      white-space: pre-wrap;
    }

    .input-meta {
      grid-column: 1 / -1;
      min-height: 15px;
      color: var(--subtle);
      font-size: 11px;
      line-height: 1.35;
      text-align: right;
    }

    .input-meta.warning {
      color: var(--accent-2);
    }

    textarea {
      width: 100%;
      max-height: 132px;
      min-height: 44px;
      resize: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 13px;
      background: var(--surface);
      color: var(--text);
      caret-color: var(--accent);
      font-size: 16px;
      line-height: 1.35;
      outline: none;
    }

    textarea:focus {
      border-color: rgba(214, 164, 95, 0.72);
      box-shadow: 0 0 0 3px rgba(214, 164, 95, 0.14);
    }

    textarea::placeholder {
      color: var(--subtle);
    }

    .send {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: var(--accent);
      color: #14110d;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .send:active {
      transform: translateY(1px);
    }

    .send:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .send svg {
      width: 21px;
      height: 21px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(78px + var(--safe-bottom));
      z-index: 20;
      max-width: calc(100vw - 32px);
      padding: 10px 13px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-3);
      color: var(--text);
      box-shadow: var(--shadow);
      font-size: 13px;
      line-height: 1.3;
      transform: translateX(-50%) translateY(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%);
    }

    @media (min-width: 720px) {
      .topbar {
        grid-template-columns: 72px 1fr 72px;
        padding-left: 20px;
        padding-right: 20px;
      }

      .messages {
        padding-left: 24px;
        padding-right: 24px;
      }

      .bubble {
        max-width: min(72%, 760px);
      }
    }

    .activity-feed {
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.18);
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
    }

    .activity-step {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .activity-step .step-icon {
      flex: 0 0 14px;
      font-size: 11px;
    }

    .activity-step.done .step-icon {
      color: var(--accent-2);
    }

    .activity-step.active .step-icon {
      color: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <button class="icon-button" id="topAddStrandBtn" type="button" aria-label="Open new Strand" title="Open new Strand" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path d="M12 5v14"></path>
          <path d="M5 12h14"></path>
        </svg>
      </button>
      <div class="brand">
        <h1>Cal</h1>
        <div class="status" aria-live="polite">
          <span class="status-dot busy" id="statusDot"></span>
          <span id="statusText">Loading session</span>
        </div>
      </div>
      <button class="icon-button" id="refreshBtn" type="button" aria-label="Refresh session" title="Refresh session">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path d="M21 12a9 9 0 0 1-15.3 6.4"></path>
          <path d="M3 12A9 9 0 0 1 18.3 5.6"></path>
          <path d="M18 2v4h4"></path>
          <path d="M6 22v-4H2"></path>
        </svg>
      </button>
    </header>

    <nav class="strand-tabs" id="strandTabs" aria-label="Cal sessions" hidden>
      <div class="tabs-list" id="tabsList"></div>
    </nav>

    <main class="messages" id="messages" aria-live="polite">
      <section class="empty" id="emptyState">
        <div class="empty-mark">C</div>
        <h2>Hi, I am Cal.</h2>
        <p>Ready when you are.</p>
      </section>
    </main>

    <form class="composer" id="composer">
      <div class="composer-shell">
        <input class="file-input" id="fileInput" type="file" accept="image/jpeg,image/png,image/gif,image/webp,image/*">
        <button class="attach" id="attachBtn" type="button" aria-label="Attach image" title="Attach image">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path d="m21.4 11.6-8.5 8.5a6 6 0 0 1-8.5-8.5l9.2-9.2a4 4 0 1 1 5.7 5.7l-9.2 9.2a2 2 0 0 1-2.8-2.8l8.5-8.5"></path>
          </svg>
        </button>
        <textarea id="input" rows="1" maxlength="50000" autocomplete="off" autocapitalize="sentences" placeholder="Message Cal..."></textarea>
        <button class="send" id="send" type="submit" aria-label="Send message" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path d="M22 2 11 13"></path>
            <path d="m22 2-7 20-4-9-9-4 20-7Z"></path>
          </svg>
        </button>
        <div class="attachment-preview" id="attachmentPreview" hidden>
          <img id="attachmentThumb" alt="">
          <div>
            <div class="attachment-name" id="attachmentName"></div>
            <div class="attachment-size" id="attachmentSize"></div>
          </div>
          <button class="remove-attachment" id="removeAttachment" type="button" aria-label="Remove image">×</button>
        </div>
        <div class="input-meta" id="inputMeta"></div>
      </div>
    </form>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const app = document.getElementById('app');
    const messagesEl = document.getElementById('messages');
    const emptyState = document.getElementById('emptyState');
    const input = document.getElementById('input');
    const inputMeta = document.getElementById('inputMeta');
    const sendBtn = document.getElementById('send');
    const attachBtn = document.getElementById('attachBtn');
    const fileInput = document.getElementById('fileInput');
    const attachmentPreview = document.getElementById('attachmentPreview');
    const attachmentThumb = document.getElementById('attachmentThumb');
    const attachmentName = document.getElementById('attachmentName');
    const attachmentSize = document.getElementById('attachmentSize');
    const removeAttachment = document.getElementById('removeAttachment');
    const composer = document.getElementById('composer');
    const refreshBtn = document.getElementById('refreshBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const toast = document.getElementById('toast');
    const strandTabs = document.getElementById('strandTabs');
    const tabsList = document.getElementById('tabsList');
    const topAddStrandBtn = document.getElementById('topAddStrandBtn');

    let toastTimer = null;
    let isProcessing = false;
    let multiSessionEnabled = false;
    let activeSessionId = null;
    const sessions = new Map();
    const sessionViews = new Map();
    const DEFAULT_SESSION_ID = '__default__';
    const MAX_INPUT_CHARS = 50000;
    const MAX_IMAGE_BYTES = 5 * 1024 * 1024;
    const SUPPORTED_IMAGE_TYPES = new Set(['image/jpeg', 'image/png', 'image/gif', 'image/webp']);
    const TOKEN_ESTIMATE_CHARS = 4;
    let selectedImage = null;
    let selectedImageUrl = null;
    input.maxLength = MAX_INPUT_CHARS;

    function getActiveSession() {
      return activeSessionId ? sessions.get(activeSessionId) : null;
    }

    function getCalHomeSession() {
      return Array.from(sessions.values()).find(session => session.permanent) || null;
    }

    function getFallbackSessionId(preferredSessionId = null) {
      if (preferredSessionId && sessions.has(preferredSessionId)) return preferredSessionId;
      const home = getCalHomeSession();
      return home?.sessionId || Array.from(sessions.keys())[0] || null;
    }

    function isActiveProcessing() {
      return getActiveSession()?.status === 'working' || isProcessing;
    }

    function normalizeSessionStatus(state) {
      return state === 'processing' || state === 'working' ? 'working' : 'ready';
    }

    function isSessionMissingError(error) {
      return /No active session|Unknown session/i.test(String(error || ''));
    }

    function viewIdFor(sessionId) {
      return sessionId || activeSessionId || DEFAULT_SESSION_ID;
    }

    function ensureSessionView(sessionId = activeSessionId) {
      const id = viewIdFor(sessionId);
      let view = sessionViews.get(id);
      if (view) return view;

      const container = document.createElement('section');
      container.className = 'chat-session';
      container.dataset.sessionId = id;
      messagesEl.appendChild(container);

      view = {
        id,
        container,
        pendingBubble: null,
        activityFeed: null,
      };
      sessionViews.set(id, view);
      showActiveSessionView();
      return view;
    }

    function migrateDefaultView(sessionId) {
      if (!sessionId || sessionId === DEFAULT_SESSION_ID || !sessionViews.has(DEFAULT_SESSION_ID) || sessionViews.has(sessionId)) {
        return;
      }
      const view = sessionViews.get(DEFAULT_SESSION_ID);
      sessionViews.delete(DEFAULT_SESSION_ID);
      view.id = sessionId;
      view.container.dataset.sessionId = sessionId;
      sessionViews.set(sessionId, view);
    }

    function getSessionView(sessionId = activeSessionId) {
      return ensureSessionView(sessionId);
    }

    function showActiveSessionView(options = {}) {
      const activeId = viewIdFor(activeSessionId);
      for (const [id, view] of sessionViews.entries()) {
        view.container.classList.toggle('active', id === activeId);
      }
      updateEmptyState();
      if (options.scrollToBottom) {
        scrollActiveSessionToBottom();
      }
    }

    function updateEmptyState() {
      const activeView = sessionViews.get(viewIdFor(activeSessionId));
      emptyState.hidden = Boolean(activeView && activeView.container.childElementCount > 0);
    }

    function shouldSyncSessionView(sessionId) {
      const view = sessionViews.get(viewIdFor(sessionId));
      return !view || (view.container.childElementCount === 0 && !view.pendingBubble);
    }

    function removeStaleSessionViews(activeIds) {
      for (const [id, view] of sessionViews.entries()) {
        if (id === DEFAULT_SESSION_ID || activeIds.has(id)) continue;
        view.container.remove();
        sessionViews.delete(id);
      }
      showActiveSessionView();
    }

    function clearPendingResponse(sessionId = activeSessionId) {
      const view = sessionViews.get(viewIdFor(sessionId));
      if (!view) return;
      if (view.pendingBubble) {
        view.pendingBubble.remove();
        view.pendingBubble = null;
      }
      view.activityFeed = null;
      updateEmptyState();
    }

    function updateActivePlaceholder() {
      const active = getActiveSession();
      input.placeholder = `Message ${active?.name || 'Cal'}...`;
    }

    function upsertSession(session) {
      if (!session || !session.sessionId) return;
      const existing = sessions.get(session.sessionId) || {};
      sessions.set(session.sessionId, {
        ...existing,
        ...session,
        status: normalizeSessionStatus(session.status || existing.status || 'ready'),
      });
      if (!activeSessionId) activeSessionId = session.sessionId;
      ensureSessionView(session.sessionId);
    }

    function setActiveSession(sessionId, options = {}) {
      if (!sessionId || !sessions.has(sessionId)) return;
      activeSessionId = sessionId;
      ensureSessionView(sessionId);
      showActiveSessionView({ scrollToBottom: true });
      renderTabs();
      updateActiveStatus();
      updateActivePlaceholder();
      if (options.sync !== false && shouldSyncSessionView(sessionId)) {
        syncActiveHistory();
      }
    }

    function renderTabs() {
      const list = Array.from(sessions.values());
      const strandCount = list.filter(item => !item.permanent).length;
      const showTabs = multiSessionEnabled && list.length > 1;
      strandTabs.hidden = !showTabs;
      topAddStrandBtn.hidden = !multiSessionEnabled || strandCount >= 3;
      topAddStrandBtn.disabled = strandCount >= 3;
      app.classList.toggle('has-strands', showTabs);
      tabsList.textContent = '';

      for (const session of list) {
        const tab = document.createElement('button');
        tab.type = 'button';
        tab.className = 'session-tab ' +
          (session.sessionId === activeSessionId ? 'active ' : '') +
          (session.permanent ? 'permanent ' : '') +
          (session.status === 'working' ? 'working' : 'ready');
        tab.dataset.sessionId = session.sessionId;
        tab.setAttribute('aria-label', session.name);
        tab.innerHTML = `<span class="tab-dot"></span><span class="tab-name">${escapeHtml(session.name)}</span>`;

        if (!session.permanent) {
          const close = document.createElement('span');
          close.className = 'close-tab';
          close.textContent = '×';
          close.setAttribute('aria-hidden', 'true');
          tab.appendChild(close);
        }

        tab.addEventListener('click', event => {
          if (event.target.closest('.close-tab')) {
            closeSession(session.sessionId);
            return;
          }
          setActiveSession(session.sessionId);
        });

        let pressTimer = null;
        tab.addEventListener('pointerdown', () => {
          if (session.permanent) return;
          pressTimer = setTimeout(() => closeSession(session.sessionId), 650);
        });
        ['pointerup', 'pointerleave', 'pointercancel'].forEach(type => {
          tab.addEventListener(type, () => {
            clearTimeout(pressTimer);
            pressTimer = null;
          });
        });

        tabsList.appendChild(tab);
      }

    }

    function updateActiveStatus() {
      const active = getActiveSession();
      if (!active) {
        isProcessing = false;
        setStatus('error', 'No active session');
        return;
      }
      isProcessing = active.status === 'working';
      setStatus(isProcessing ? 'busy' : 'online', isProcessing ? 'Working' : 'Ready');
    }

    function syncActiveHistory() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'sync', sessionId: activeSessionId }));
      } else {
        loadHistoryHttp(activeSessionId);
      }
    }

    // --- WebSocket Connection ---
    const WS_ORIGIN = window.location.protocol === 'file:'
      ? 'ws://127.0.0.1:8080'
      : `${window.location.protocol === 'https:' ? 'wss' : 'ws'}://${window.location.host}`;
    const API_ORIGIN = window.location.protocol === 'file:' ? 'http://127.0.0.1:8080' : '';

    let ws = null;
    let wsReconnectDelay = 1000;
    const WS_MAX_DELAY = 16000;

    function wsConnect() {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;

      ws = new WebSocket(WS_ORIGIN + '/ws');

      ws.addEventListener('open', () => {
        console.log('[WS] Connected');
        wsReconnectDelay = 1000;
        setStatus('online', 'Connected');
        loadSessions();
        // Request history sync on connect
        ws.send(JSON.stringify({ type: 'sync', sessionId: activeSessionId }));
      });

      ws.addEventListener('message', (event) => {
        let msg;
        try { msg = JSON.parse(event.data); } catch { return; }
        handleServerEvent(msg);
      });

      ws.addEventListener('close', () => {
        console.log('[WS] Disconnected');
        ws = null;
        if (!isProcessing) setStatus('error', 'Disconnected');
        scheduleReconnect();
      });

      ws.addEventListener('error', () => {
        // Error fires before close — just let close handle reconnection
      });
    }

    function scheduleReconnect() {
      setTimeout(() => {
        wsConnect();
      }, wsReconnectDelay);
      wsReconnectDelay = Math.min(wsReconnectDelay * 2, WS_MAX_DELAY);
    }

    function wsSend(msg) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(msg));
        return true;
      }
      return false;
    }

    // --- Handle Server Events ---
    function handleServerEvent(msg) {
      switch (msg.type) {
        case 'sessions':
          applySessions(msg.sessions || []);
          break;

        case 'status':
          if (msg.sessionId && sessions.has(msg.sessionId)) {
            const session = sessions.get(msg.sessionId);
            session.status = normalizeSessionStatus(msg.state);
            renderTabs();
            if (msg.sessionId !== activeSessionId) break;
          }
          if (msg.state === 'processing') {
            isProcessing = true;
            setStatus('busy', 'Working');
          } else if (msg.state === 'idle') {
            isProcessing = false;
            setStatus('online', 'Ready');
          }
          break;

        case 'history':
          renderHistory(msg);
          break;

        case 'run_started':
          {
            const sessionId = msg.sessionId || activeSessionId;
            const view = getSessionView(sessionId);
            clearPendingResponse(sessionId);

            if (msg.sessionId && sessions.has(msg.sessionId)) {
              sessions.get(msg.sessionId).status = 'working';
              renderTabs();
            }

            if (!msg.sessionId || msg.sessionId === activeSessionId) {
              isProcessing = true;
              setStatus('busy', 'Working');
            }

            view.pendingBubble = addMessage('', 'assistant', { pending: true, sessionId });
            view.activityFeed = document.createElement('div');
            view.activityFeed.className = 'activity-feed';
            view.pendingBubble.querySelector('.bubble').appendChild(view.activityFeed);
          }
          break;

        case 'step_started':
          {
            const view = getSessionView(msg.sessionId || activeSessionId);
            if (view.activityFeed) {
              const step = document.createElement('div');
              step.className = 'activity-step active';
              step.dataset.tool = msg.tool;
              step.innerHTML = `<span class="step-icon">●</span><span>${escapeHtml(msg.description || msg.tool)}</span>`;
              view.activityFeed.appendChild(step);
              if (!msg.sessionId || msg.sessionId === activeSessionId) scrollToBottom();
            }
          }
          break;

        case 'step_finished':
          {
            const view = getSessionView(msg.sessionId || activeSessionId);
            if (view.activityFeed) {
              const activeStep = view.activityFeed.querySelector(`.activity-step.active[data-tool="${msg.tool}"]`);
              if (activeStep) {
                activeStep.classList.remove('active');
                activeStep.classList.add('done');
                activeStep.querySelector('.step-icon').textContent = '✓';
              }
            }
          }
          break;

        case 'text_done':
          {
            const sessionId = msg.sessionId || activeSessionId;
            clearPendingResponse(sessionId);
            addMessage(msg.fullText || 'No response', 'assistant', { sessionId });
            if (!msg.sessionId || msg.sessionId === activeSessionId) {
              isProcessing = false;
              setStatus('online', 'Ready');
            }
          }
          break;

        case 'run_finished':
          if (msg.sessionId && sessions.has(msg.sessionId)) {
            sessions.get(msg.sessionId).status = 'ready';
            renderTabs();
          }
          if (!msg.sessionId || msg.sessionId === activeSessionId) {
            isProcessing = false;
            setStatus('online', 'Ready');
          }
          break;

        case 'run_error':
          if (msg.staleSession || isSessionMissingError(msg.error)) {
            recoverMissingSession(msg.sessionId, msg.sessions);
            break;
          }
          if (msg.sessionId && sessions.has(msg.sessionId)) {
            sessions.get(msg.sessionId).status = 'ready';
            renderTabs();
          }
          clearPendingResponse(msg.sessionId || activeSessionId);
          addMessage('Error: ' + (msg.error || 'Something went wrong'), 'assistant', { sessionId: msg.sessionId || activeSessionId });
          if (!msg.sessionId || msg.sessionId === activeSessionId) {
            isProcessing = false;
            setStatus('error', 'Error');
          }
          break;

        case 'proactive':
          addMessage(msg.text, 'assistant', { sessionId: msg.sessionId || activeSessionId });
          showToast('New message from Cal');
          break;

        case 'error':
          console.warn('[WS] Server error:', msg.error);
          break;
      }
    }

    function applySessions(serverSessions) {
      if (!serverSessions.length) return;
      multiSessionEnabled = true;
      const previousActive = activeSessionId;
      sessions.clear();
      activeSessionId = null;
      for (const session of serverSessions) upsertSession(session);
      activeSessionId = getFallbackSessionId(previousActive);
      removeStaleSessionViews(new Set(serverSessions.map(session => session.sessionId)));
      ensureSessionView(activeSessionId);
      showActiveSessionView();
      renderTabs();
      updateActivePlaceholder();
      updateActiveStatus();
    }

    async function recoverMissingSession(sessionId, serverSessions = null) {
      const wasActive = !sessionId || sessionId === activeSessionId;
      const missingName = sessions.get(sessionId)?.name || 'That Strand';
      clearPendingResponse(sessionId || activeSessionId);

      if (Array.isArray(serverSessions) && serverSessions.length) {
        applySessions(serverSessions);
      } else {
        await loadSessions();
      }

      if (sessionId && sessions.has(sessionId)) {
        sessions.get(sessionId).status = 'ready';
        renderTabs();
        updateActiveStatus();
        return;
      }

      if (wasActive) {
        const nextSessionId = getFallbackSessionId();
        if (nextSessionId) {
          setActiveSession(nextSessionId);
        } else {
          activeSessionId = null;
          renderTabs();
          updateActivePlaceholder();
          setStatus('error', 'No active session');
        }
        showToast(`${missingName} is no longer active. Switched back to Cal.`);
      }

      isProcessing = false;
      input.disabled = false;
      autoSizeInput();
    }

    function renderHistory(data) {
      if (data.sessionId && !activeSessionId) {
        migrateDefaultView(data.sessionId);
        upsertSession({
          sessionId: data.sessionId,
          name: 'Cal',
          status: 'ready',
          permanent: true,
        });
        activeSessionId = data.sessionId;
      }
      const sessionId = data.sessionId || activeSessionId;
      const view = getSessionView(sessionId);
      clearMessages(sessionId);
      let dividerInserted = false;
      for (const message of data.messages || []) {
        if (!dividerInserted && !message.preReset) {
          const hasPreReset = (data.messages || []).some(m => m.preReset);
          if (hasPreReset) {
            const divider = document.createElement('div');
            divider.className = 'session-divider';
            divider.textContent = 'session refreshed';
            view.container.appendChild(divider);
          }
          dividerInserted = true;
        }
        addMessage(message.content, message.role, { preReset: message.preReset, sessionId });
      }
      const visibleCount = (data.messages || []).length;
      if (!data.sessionId || data.sessionId === activeSessionId) {
        setStatus('online', visibleCount ? visibleCount + ' messages' : 'Ready');
      }
    }

    // --- Send Message ---
    async function sendMessage() {
      const text = input.value.trim();
      const image = selectedImage;
      const imageUrl = selectedImageUrl;
      if (!text && !image) return;
      const targetSessionId = activeSessionId;

      if (multiSessionEnabled && (!activeSessionId || !sessions.has(activeSessionId))) {
        await recoverMissingSession(activeSessionId);
        return;
      }
      if (isActiveProcessing()) {
        if (image) {
          showToast('Wait for Cal to finish before sending an image.');
          return;
        }
        // Steering: send as steer event while Cal is working
        wsSend({ type: 'steer', sessionId: targetSessionId, text });
        addMessage(text, 'user', { sessionId: targetSessionId });
        input.value = '';
        autoSizeInput();
        showToast('Steering sent');
        return;
      }

      addMessage(text || 'Image attached', 'user', {
        sessionId: targetSessionId,
        imageUrl,
        imageName: image?.name,
      });
      input.value = '';
      if (image) clearAttachment({ revoke: false });
      autoSizeInput();

      if (image) {
        await sendMessageHttp(text, image);
        return;
      }

      const sent = wsSend({ type: 'message', sessionId: targetSessionId, text });
      if (!sent) {
        // Fallback to HTTP if WebSocket not connected
        sendMessageHttp(text);
        return;
      }
    }

    async function sendMessageHttp(text, image = null) {
      const targetSessionId = activeSessionId;
      isProcessing = true;
      input.disabled = true;
      attachBtn.disabled = true;
      setStatus('busy', 'Thinking');
      const loading = addMessage('Cal is thinking...', 'assistant', { pending: true, sessionId: targetSessionId });

      try {
        let response;
        const buildRequest = () => {
          if (!image) {
            return {
              headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
              body: JSON.stringify({ message: text }),
            };
          }

          const form = new FormData();
          form.append('message', text || '');
          form.append('image', image, image.name || 'image');
          return {
            headers: { Accept: 'application/json' },
            body: form,
          };
        };

        if (multiSessionEnabled && targetSessionId) {
          response = await fetch(apiUrl(`/api/sessions/${encodeURIComponent(targetSessionId)}/message`), {
            method: 'POST',
            ...buildRequest(),
          });
        } else {
          response = await fetch(apiUrl('/api/chat/send'), {
            method: 'POST',
            ...buildRequest(),
          });
          if (!image && response.status === 404) {
            response = await fetch(apiUrl('/'), {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
              body: JSON.stringify({ message: text }),
            });
          }
        }
        const data = await readJsonResponse(response, 'Could not send message');
        loading.remove();
        addMessage(data.message || 'No response', 'assistant', { sessionId: targetSessionId });
        if (!targetSessionId || targetSessionId === activeSessionId) setStatus('online', 'Ready');
      } catch (error) {
        loading.remove();
        if (error.data?.staleSession || isSessionMissingError(error.message)) {
          await recoverMissingSession(targetSessionId, error.data?.sessions);
          return;
        }
        addMessage('Error: ' + (error.message || 'Could not reach Cal'), 'assistant', { sessionId: targetSessionId });
        if (!targetSessionId || targetSessionId === activeSessionId) setStatus('error', 'Offline');
      } finally {
        isProcessing = false;
        input.disabled = false;
        attachBtn.disabled = false;
        autoSizeInput();
        input.focus({ preventScroll: true });
      }
    }

    async function loadSessions() {
      try {
        const response = await fetch(apiUrl('/api/sessions'), {
          headers: { Accept: 'application/json' },
        });
        if (!response.ok) return;
        const data = await response.json();
        applySessions(data.sessions || []);
      } catch {
        // Feature flag is probably off or the gateway is offline.
      }
    }

    async function createStrand() {
      if (!multiSessionEnabled) return;
      topAddStrandBtn.disabled = true;
      try {
        const response = await fetch(apiUrl('/api/sessions'), {
          method: 'POST',
          headers: { Accept: 'application/json' },
        });
        const data = await readJsonResponse(response, 'Could not create Strand');
        applySessions(data.sessions || []);
        if (data.session?.sessionId) {
          setActiveSession(data.session.sessionId);
        }
      } catch (error) {
        showToast(error.message || 'Could not create Strand');
      } finally {
        renderTabs();
      }
    }

    async function closeSession(sessionId) {
      const session = sessions.get(sessionId);
      if (!session || session.permanent) return;
      if (!window.confirm(`Close ${session.name}?`)) return;

      try {
        const response = await fetch(apiUrl(`/api/sessions/${encodeURIComponent(sessionId)}`), {
          method: 'DELETE',
          headers: { Accept: 'application/json' },
        });
        const data = await readJsonResponse(response, `Could not close ${session.name}`);
        applySessions(data.sessions || []);
        const nextSessionId = getFallbackSessionId();
        if (nextSessionId) {
          setActiveSession(nextSessionId);
        }
        showToast(`${session.name} closed`);
      } catch (error) {
        showToast(error.message || `Could not close ${session.name}`);
      }
    }

    async function loadHistoryHttp(sessionId) {
      try {
        const query = sessionId ? `?sessionId=${encodeURIComponent(sessionId)}` : '';
        const response = await fetch(apiUrl('/api/session/history' + query), {
          headers: { Accept: 'application/json' },
        });
        const data = await readJsonResponse(response, 'Could not load session');
        renderHistory(data);
      } catch (error) {
        showToast(error.message || 'Could not load session');
      }
    }

    // --- Utilities ---
    function escapeHtml(value) {
      const div = document.createElement('div');
      div.textContent = value || '';
      return div.innerHTML;
    }

    function renderInlineMarkdown(value) {
      return value
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>')
        .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
    }

    function renderMarkdown(text) {
      const escaped = escapeHtml(text).replace(/\r\n/g, '\n');
      const blocks = [];
      let inCode = false;
      let codeLines = [];
      let listLines = [];
      let tableRows = [];
      let paragraph = [];

      function flushParagraph() {
        if (paragraph.length) {
          blocks.push('<p>' + renderInlineMarkdown(paragraph.join(' ')) + '</p>');
          paragraph = [];
        }
      }

      function flushList() {
        if (listLines.length) {
          const hasTasks = listLines.some(item => item.task);
          const className = hasTasks ? ' class="task-list"' : '';
          blocks.push('<ul' + className + '>' + listLines.map(item => {
            if (!item.task) {
              return '<li>' + renderInlineMarkdown(item.text) + '</li>';
            }

            const mark = item.checked ? 'x' : '';
            return '<li><span class="task-box">' + mark + '</span><span>' + renderInlineMarkdown(item.text) + '</span></li>';
          }).join('') + '</ul>');
          listLines = [];
        }
      }

      function isTableLine(line) {
        return line.includes('|') && !line.startsWith('&gt; ');
      }

      function isTableDivider(line) {
        return /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(line);
      }

      function tableCells(line) {
        return line.trim().replace(/^\|/, '').replace(/\|$/, '').split('|').map(cell => cell.trim());
      }

      function flushTable() {
        if (!tableRows.length) return;

        if (tableRows.length >= 2 && isTableDivider(tableRows[1])) {
          const headers = tableCells(tableRows[0]);
          const bodyRows = tableRows.slice(2).map(tableCells);
          const thead = '<thead><tr>' + headers.map(cell => '<th>' + renderInlineMarkdown(cell) + '</th>').join('') + '</tr></thead>';
          const tbody = '<tbody>' + bodyRows.map(row => (
            '<tr>' + row.map(cell => '<td>' + renderInlineMarkdown(cell) + '</td>').join('') + '</tr>'
          )).join('') + '</tbody>';
          blocks.push('<div class="table-wrap"><table>' + thead + tbody + '</table></div>');
        } else {
          for (const row of tableRows) {
            paragraph.push(row);
          }
        }

        tableRows = [];
      }

      for (const rawLine of escaped.split('\n')) {
        const line = rawLine.trimEnd();

        if (line.startsWith('```')) {
          if (inCode) {
            blocks.push('<pre><code>' + codeLines.join('\n') + '</code></pre>');
            codeLines = [];
            inCode = false;
          } else {
            flushParagraph();
            flushList();
            flushTable();
            inCode = true;
          }
          continue;
        }

        if (inCode) {
          codeLines.push(line);
          continue;
        }

        if (!line.trim()) {
          flushParagraph();
          flushList();
          flushTable();
          continue;
        }

        if (isTableLine(line)) {
          flushParagraph();
          flushList();
          tableRows.push(line);
          continue;
        }

        const heading = line.match(/^(#{1,3})\s+(.+)$/);
        if (heading) {
          flushParagraph();
          flushList();
          flushTable();
          const level = heading[1].length;
          blocks.push('<h' + level + '>' + renderInlineMarkdown(heading[2]) + '</h' + level + '>');
          continue;
        }

        const bullet = line.match(/^[-*]\s+(\[[ xX]\]\s+)?(.+)$/);
        if (bullet) {
          flushParagraph();
          flushTable();
          listLines.push({
            task: Boolean(bullet[1]),
            checked: /\[[xX]\]/.test(bullet[1] || ''),
            text: bullet[2],
          });
          continue;
        }

        if (line.startsWith('&gt; ')) {
          flushParagraph();
          flushList();
          flushTable();
          blocks.push('<blockquote>' + renderInlineMarkdown(line.slice(5)) + '</blockquote>');
          continue;
        }

        flushList();
        flushTable();
        paragraph.push(line);
      }

      flushParagraph();
      flushList();
      flushTable();

      if (inCode) {
        blocks.push('<pre><code>' + codeLines.join('\n') + '</code></pre>');
      }

      return blocks.join('');
    }

    function setStatus(kind, text) {
      statusDot.className = 'status-dot ' + kind;
      statusText.textContent = text;
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    function apiUrl(path) {
      return API_ORIGIN + path;
    }

    async function readJsonResponse(response, fallbackMessage) {
      const text = await response.text();
      let data = null;

      if (text.trim()) {
        try {
          data = JSON.parse(text);
        } catch {
          data = null;
        }
      }

      if (!response.ok) {
        const detail = data?.error || text.trim() || response.statusText || fallbackMessage;
        const error = new Error(detail);
        error.data = data;
        throw error;
      }

      if (!text.trim()) return {};
      if (!data) {
        throw new Error(fallbackMessage + ': server returned non-JSON text');
      }
      return data;
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function scrollActiveSessionToBottom() {
      requestAnimationFrame(() => {
        scrollToBottom();
      });
    }

    function setEmptyVisible(isVisible) {
      emptyState.hidden = !isVisible;
    }

    function addMessage(text, role, options = {}) {
      setEmptyVisible(false);
      const view = getSessionView(options.sessionId || activeSessionId);
      const row = document.createElement('article');
      row.className = 'message ' + role + (options.pending ? ' pending' : '') + (options.preReset ? ' pre-reset' : '');
      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      if (role === 'assistant') {
        bubble.innerHTML = options.pending ? (text ? escapeHtml(text) : '') : renderMarkdown(text);
      } else if (options.imageUrl) {
        const wrap = document.createElement('div');
        wrap.className = 'message-attachment';
        const image = document.createElement('img');
        image.className = 'message-image';
        image.src = options.imageUrl;
        image.alt = options.imageName || 'Attached image';
        wrap.appendChild(image);
        if (text) {
          const label = document.createElement('div');
          label.className = 'message-text';
          label.textContent = text;
          wrap.appendChild(label);
        }
        bubble.appendChild(wrap);
      } else {
        bubble.textContent = text;
      }

      row.appendChild(bubble);
      view.container.appendChild(row);
      updateEmptyState();
      if (view.id === viewIdFor(activeSessionId)) scrollToBottom();
      return row;
    }

    function clearMessages(sessionId = activeSessionId) {
      const view = getSessionView(sessionId);
      [...view.container.querySelectorAll('.message, .session-divider')].forEach(node => node.remove());
      view.pendingBubble = null;
      view.activityFeed = null;
      updateEmptyState();
    }

    function autoSizeInput() {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 132) + 'px';
      sendBtn.disabled = input.value.trim().length === 0 && !selectedImage;
      updateInputMeta();
    }

    function formatCompactNumber(value) {
      if (value >= 1000) {
        return (value / 1000).toFixed(value >= 10000 ? 0 : 1).replace(/\.0$/, '') + 'k';
      }
      return String(value);
    }

    function formatBytes(bytes) {
      if (bytes >= 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1).replace(/\.0$/, '') + ' MB';
      if (bytes >= 1024) return Math.round(bytes / 1024) + ' KB';
      return bytes + ' B';
    }

    function clearAttachment(options = {}) {
      const revoke = options.revoke !== false;
      if (revoke && selectedImageUrl) {
        URL.revokeObjectURL(selectedImageUrl);
      }
      selectedImage = null;
      selectedImageUrl = null;
      fileInput.value = '';
      attachmentThumb.removeAttribute('src');
      attachmentName.textContent = '';
      attachmentSize.textContent = '';
      attachmentPreview.hidden = true;
      autoSizeInput();
    }

    function setSelectedImage(file) {
      if (!file) return;
      if (!SUPPORTED_IMAGE_TYPES.has(file.type)) {
        showToast('Use JPEG, PNG, GIF, or WebP.');
        fileInput.value = '';
        return;
      }
      if (file.size > MAX_IMAGE_BYTES) {
        showToast('Image must be 5 MB or less.');
        fileInput.value = '';
        return;
      }

      clearAttachment();
      selectedImage = file;
      selectedImageUrl = URL.createObjectURL(file);
      attachmentThumb.src = selectedImageUrl;
      attachmentThumb.alt = file.name || 'Selected image';
      attachmentName.textContent = file.name || 'Selected image';
      attachmentSize.textContent = `${file.type.replace('image/', '').toUpperCase()} · ${formatBytes(file.size)}`;
      attachmentPreview.hidden = false;
      autoSizeInput();
    }

    function updateInputMeta() {
      const charCount = input.value.length;
      const estimatedTokens = Math.ceil(charCount / TOKEN_ESTIMATE_CHARS);
      const attachmentText = selectedImage ? ` / ${formatBytes(selectedImage.size)} image` : '';
      inputMeta.textContent = `${charCount.toLocaleString()} / ${MAX_INPUT_CHARS.toLocaleString()} chars / ~${formatCompactNumber(estimatedTokens)} tokens${attachmentText}`;
      inputMeta.classList.toggle('warning', charCount >= MAX_INPUT_CHARS * 0.9);
    }

    // --- Event Listeners ---
    composer.addEventListener('submit', event => {
      event.preventDefault();
      sendMessage();
    });

    input.addEventListener('input', autoSizeInput);
    input.addEventListener('keydown', event => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    attachBtn.addEventListener('click', () => {
      if (attachBtn.disabled) return;
      fileInput.click();
    });

    fileInput.addEventListener('change', () => {
      setSelectedImage(fileInput.files?.[0]);
    });

    removeAttachment.addEventListener('click', () => {
      clearAttachment();
      input.focus({ preventScroll: true });
    });

    refreshBtn.addEventListener('click', () => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'sync', sessionId: activeSessionId }));
      } else {
        loadHistoryHttp(activeSessionId);
      }
      showToast('Session refreshed');
    });

    topAddStrandBtn.addEventListener('click', createStrand);

    window.addEventListener('online', () => {
      setStatus('online', 'Online');
      wsConnect();
    });

    window.addEventListener('offline', () => setStatus('error', 'Offline'));

    // Presence: notify Cal when tab visibility changes
    document.addEventListener('visibilitychange', () => {
      const status = document.hidden ? 'away' : 'active';
      wsSend({ type: 'presence', status });
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const raw = atob(base64);
      const arr = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
      return arr;
    }

    async function setupPushNotifications() {
      if (!('Notification' in window) || !('PushManager' in window)) {
        console.warn('[Push] Not supported on this browser/context');
        return;
      }

      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        console.warn('[Push] Permission denied or dismissed');
        return;
      }

      const reg = await navigator.serviceWorker.ready;
      let sub = await reg.pushManager.getSubscription();
      if (sub) {
        console.log('[Push] Already subscribed');
        return;
      }

      try {
        const vapidRes = await fetch('/api/push/vapid-public-key');
        if (!vapidRes.ok) return;
        const { key } = await vapidRes.json();

        sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(key),
        });

        await fetch('/api/push/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(sub),
        });
        console.log('[Push] Subscribed successfully');
      } catch (err) {
        console.warn('[Push] Subscription failed:', err.message);
      }
    }

    // On iOS, notification permission must be triggered by user gesture.
    // On desktop, we can request automatically.
    function showPushBanner() {
      if (!('Notification' in window) || !('PushManager' in window)) return;
      if (Notification.permission === 'granted') {
        setupPushNotifications();
        return;
      }
      if (Notification.permission === 'denied') return;
      // Permission not yet decided — request it (works on desktop, not iOS over HTTP)
      setupPushNotifications();
    }

    // Run after SW activates
    navigator.serviceWorker?.ready.then(() => showPushBanner());

    // --- Boot ---
    loadSessions();
    wsConnect();
    autoSizeInput();
  </script>
</body>
</html>
