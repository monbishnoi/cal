<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#101014">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cal">
  <meta name="format-detection" content="telephone=no">
  <title>Cal</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      color-scheme: dark;
      --bg: #101014;
      --surface: #18191d;
      --surface-2: #22242a;
      --surface-3: #2c2f36;
      --text: #f4f0ea;
      --muted: #aaa7a1;
      --subtle: #74716c;
      --border: rgba(244, 240, 234, 0.12);
      --user: #176b87;
      --assistant: #24262c;
      --accent: #d6a45f;
      --accent-2: #58c7a5;
      --attention: #5b9dff;
      --danger: #f07167;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
    }

    #app {
      display: grid;
      grid-template-rows: minmax(0, 1fr);
      height: 100vh;
      height: 100dvh;
      background:
        linear-gradient(180deg, rgba(214, 164, 95, 0.08), transparent 220px),
        var(--bg);
    }

    #app.has-strands {
      grid-template-rows: minmax(0, 1fr);
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 12;
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      min-height: calc(56px + var(--safe-top));
      padding: var(--safe-top) calc(12px + var(--safe-right)) 0 calc(12px + var(--safe-left));
      background:
        linear-gradient(180deg, rgba(16, 16, 20, 0.52), rgba(16, 16, 20, 0.16)),
        rgba(16, 16, 20, 0.18);
      border-bottom: 1px solid rgba(244, 240, 234, 0.06);
      box-shadow: 0 10px 34px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(34px) saturate(190%);
      -webkit-backdrop-filter: blur(34px) saturate(190%);
    }

    #app.has-strands .topbar {
      background:
        linear-gradient(180deg, rgba(16, 16, 20, 0.46), rgba(16, 16, 20, 0.12)),
        rgba(16, 16, 20, 0.14);
      border-bottom-color: transparent;
      box-shadow: 0 6px 26px rgba(0, 0, 0, 0.06);
    }

    .brand {
      position: relative;
      z-index: 0;
      min-width: 0;
      text-align: center;
    }

    .brand::before {
      content: "";
      position: absolute;
      top: -30px;
      bottom: -24px;
      left: 50%;
      width: min(96vw, 520px);
      z-index: -1;
      border-radius: 999px;
      background:
        radial-gradient(ellipse at 28% 42%, rgba(88, 199, 165, 0.34), transparent 48%),
        radial-gradient(ellipse at 70% 50%, rgba(214, 164, 95, 0.32), transparent 54%),
        radial-gradient(ellipse at 50% 74%, rgba(255, 236, 194, 0.18), transparent 58%);
      background-size: 170% 150%;
      opacity: 0;
      filter: blur(16px);
      transform: translateX(-50%) scale(0.82);
      transition: opacity 0.22s ease, transform 0.22s ease;
      pointer-events: none;
    }

    .brand::after {
      content: "";
      position: absolute;
      top: -16px;
      bottom: -14px;
      left: 50%;
      width: min(70vw, 340px);
      z-index: -1;
      border-radius: 42% 58% 48% 52% / 56% 44% 56% 44%;
      background:
        linear-gradient(90deg, transparent, rgba(255, 238, 203, 0.3), rgba(88, 199, 165, 0.18), transparent);
      opacity: 0;
      filter: blur(18px);
      transform: translateX(-50%) translateY(2px) scaleX(0.76);
      transition: opacity 0.22s ease, transform 0.22s ease;
      pointer-events: none;
    }

    .brand.voice-speaking::before {
      opacity: 0.86;
      transform: translateX(-50%) scale(1);
      animation: voiceAurora 3.8s ease-in-out infinite;
    }

    .brand.voice-speaking::after {
      opacity: 0.74;
      transform: translateX(-50%) translateY(0) scaleX(1);
      animation: voiceCurrent 2.6s ease-in-out infinite;
    }

    .brand.voice-speaking h1 {
      text-shadow:
        0 0 18px rgba(255, 238, 203, 0.52),
        0 0 30px rgba(88, 199, 165, 0.22);
    }

    .brand.voice-speaking .status {
      color: var(--text);
    }

    .brand h1 {
      font-size: 17px;
      font-weight: 650;
      letter-spacing: 0;
      line-height: 1.2;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 100%;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--subtle);
    }

    .status-dot.online {
      background: var(--accent-2);
      box-shadow: 0 0 12px rgba(88, 199, 165, 0.8);
    }

    .status-dot.busy {
      background: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }

    .status-dot.attention {
      background: var(--attention);
      box-shadow: 0 0 13px rgba(91, 157, 255, 0.78);
      animation: pulse 1.45s ease-in-out infinite;
    }

    .status-dot.error {
      background: var(--danger);
    }

    @keyframes pulse {
      50% {
        opacity: 0.45;
        transform: scale(0.82);
      }
    }

    @keyframes voiceAurora {
      0%, 100% {
        background-position: 18% 50%;
        border-radius: 999px;
        transform: translateX(-50%) scale(0.96);
      }
      35% {
        background-position: 70% 38%;
        border-radius: 46% 54% 58% 42% / 50% 42% 58% 50%;
        transform: translateX(-50%) scale(1.06) translateY(1px);
      }
      70% {
        background-position: 42% 72%;
        border-radius: 58% 42% 46% 54% / 44% 56% 46% 54%;
        transform: translateX(-50%) scale(1.02) translateY(-1px);
      }
    }

    @keyframes voiceCurrent {
      0%, 100% {
        opacity: 0.32;
        transform: translateX(-50%) translateY(1px) scaleX(0.84);
      }
      45% {
        opacity: 0.78;
        transform: translateX(-50%) translateY(-1px) scaleX(1.12);
      }
      75% {
        opacity: 0.48;
        transform: translateX(-50%) translateY(2px) scaleX(0.96);
      }
    }

    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
    }

    .icon-button:active {
      background: rgba(244, 240, 234, 0.08);
      color: var(--text);
    }

    .icon-button svg {
      width: 21px;
      height: 21px;
      stroke-width: 2;
    }

    .strand-tabs {
      position: fixed;
      top: calc(56px + var(--safe-top) - 5px);
      left: 0;
      right: 0;
      z-index: 13;
      display: flex;
      align-items: flex-start;
      gap: 6px;
      min-height: 40px;
      padding: 0 calc(12px + var(--safe-right)) 10px calc(12px + var(--safe-left));
      overflow-x: auto;
      background: transparent;
      border-bottom: 0;
      box-shadow: none;
      pointer-events: none;
      scrollbar-width: none;
    }

    #app.has-strands .strand-tabs {
      display: flex;
    }

    .strand-tabs[hidden] {
      display: none;
    }

    .strand-tabs::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .tabs-list {
      display: flex;
      align-items: flex-start;
      gap: 4px;
      min-width: 0;
      pointer-events: auto;
    }

    .session-tab {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-width: 74px;
      height: 28px;
      padding: 1px 10px 0;
      isolation: isolate;
      border: 1px solid rgba(244, 240, 234, 0.13);
      border-top-color: rgba(244, 240, 234, 0.18);
      border-radius: 0 0 13px 13px;
      background:
        linear-gradient(180deg, rgba(16, 16, 20, 0.44), rgba(16, 16, 20, 0.12)),
        rgba(16, 16, 20, 0.16);
      color: var(--muted);
      opacity: 0.88;
      transform: translateY(3px) scale(0.94);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.055),
        0 10px 22px rgba(0, 0, 0, 0.09);
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      transition: opacity 0.16s ease, transform 0.16s ease, background 0.16s ease, border-color 0.16s ease;
      white-space: nowrap;
    }

    .session-tab.active {
      z-index: 2;
      height: 40px;
      min-width: 98px;
      padding-top: 4px;
      border-color: rgba(244, 240, 234, 0.18);
      border-top: 0;
      border-radius: 0 0 18px 18px;
      background:
        linear-gradient(180deg, rgba(16, 16, 20, 0.46), rgba(16, 16, 20, 0.12)),
        rgba(16, 16, 20, 0.14);
      color: var(--text);
      opacity: 1;
      transform: translateY(-8px) scale(1);
      box-shadow:
        inset 0 -1px 0 rgba(255, 255, 255, 0.08),
        0 0 0 1px rgba(214, 164, 95, 0.08),
        0 14px 26px rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(34px) saturate(190%);
      -webkit-backdrop-filter: blur(34px) saturate(190%);
    }

    .session-tab.active::before {
      content: "";
      position: absolute;
      top: -10px;
      left: -1px;
      right: -1px;
      height: 14px;
      z-index: -1;
      background:
        linear-gradient(180deg, rgba(16, 16, 20, 0.46), rgba(16, 16, 20, 0.12)),
        rgba(16, 16, 20, 0.14);
      backdrop-filter: blur(34px) saturate(190%);
      -webkit-backdrop-filter: blur(34px) saturate(190%);
    }

    .session-tab .tab-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 13px;
      line-height: 1.15;
    }

    .tab-dot {
      width: 7px;
      height: 7px;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--accent-2);
      box-shadow: 0 0 9px rgba(88, 199, 165, 0.65);
    }

    .session-tab.working .tab-dot {
      background: var(--accent);
      box-shadow: none;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .session-tab.attention .tab-dot {
      background: var(--attention);
      box-shadow: 0 0 11px rgba(91, 157, 255, 0.8);
      animation: pulse 1.45s ease-in-out infinite;
    }

    .close-tab {
      display: none;
      place-items: center;
      width: 18px;
      height: 18px;
      margin-right: -3px;
      border-radius: 6px;
      background: transparent;
      color: var(--subtle);
      font-size: 17px;
      line-height: 1;
    }

    .session-tab:not(.permanent):hover .close-tab {
      display: grid;
    }

    .close-tab:active {
      background: rgba(244, 240, 234, 0.1);
      color: var(--text);
    }

    .add-strand {
      flex: 0 0 auto;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
      font-size: 20px;
      line-height: 1;
    }

    .add-strand:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .messages {
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      padding: calc(72px + var(--safe-top)) calc(14px + var(--safe-right)) var(--composer-space, calc(112px + var(--safe-bottom))) calc(14px + var(--safe-left));
      scroll-padding-top: calc(72px + var(--safe-top));
      scroll-padding-bottom: var(--composer-space, calc(112px + var(--safe-bottom)));
    }

    #app.has-strands .messages {
      padding-top: calc(104px + var(--safe-top));
      scroll-padding-top: calc(104px + var(--safe-top));
    }

    .messages::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .empty {
      min-height: 100%;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 14px;
      padding: 40px 18px;
      color: var(--muted);
      text-align: center;
    }

    .empty-mark {
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--accent);
      box-shadow: var(--shadow);
      font-size: 22px;
      font-weight: 700;
    }

    .empty h2 {
      color: var(--text);
      font-size: 22px;
      font-weight: 680;
      letter-spacing: 0;
    }

    .empty p {
      max-width: 300px;
      font-size: 14px;
      line-height: 1.45;
    }

    .message {
      display: flex;
      margin: 0 0 12px;
      animation: rise 0.18s ease-out;
    }

    .chat-session {
      display: none;
    }

    .chat-session.active {
      display: block;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.assistant {
      justify-content: flex-start;
    }

    .bubble {
      max-width: min(86%, 760px);
      padding: 11px 13px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      line-height: 1.52;
      overflow-wrap: anywhere;
      white-space: normal;
      user-select: text;
      -webkit-user-select: text;
    }

    .message.user .bubble {
      background: var(--user);
      color: white;
      border-color: rgba(255, 255, 255, 0.12);
      border-bottom-right-radius: 3px;
    }

    .message.assistant .bubble {
      background: var(--assistant);
      color: var(--text);
      border-bottom-left-radius: 3px;
    }

    .message.pending .bubble {
      color: var(--muted);
    }

    .message.pre-reset {
      opacity: 0.55;
    }

    .session-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
      color: var(--muted);
      font-size: 12px;
    }

    .session-divider::before,
    .session-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .bubble p,
    .bubble ul,
    .bubble ol,
    .bubble pre,
    .bubble blockquote {
      margin: 0 0 0.75em;
    }

    .bubble :last-child {
      margin-bottom: 0;
    }

    .bubble ul,
    .bubble ol {
      padding-left: 1.25em;
    }

    .bubble li {
      margin-bottom: 0.3em;
    }

    .bubble h1,
    .bubble h2,
    .bubble h3 {
      margin: 0.9em 0 0.45em;
      color: #ffe2b8;
      font-weight: 680;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .bubble h1:first-child,
    .bubble h2:first-child,
    .bubble h3:first-child {
      margin-top: 0;
    }

    .bubble h1 { font-size: 1.25em; }
    .bubble h2 { font-size: 1.14em; }
    .bubble h3 { font-size: 1.05em; }

    .bubble a {
      color: #88d8c3;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .bubble code {
      font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
      font-size: 0.9em;
      padding: 0.12em 0.35em;
      border-radius: 5px;
      background: rgba(0, 0, 0, 0.26);
      color: #f8d49a;
    }

    .bubble pre {
      overflow-x: auto;
      padding: 11px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.28);
    }

    .bubble pre code {
      padding: 0;
      background: transparent;
      white-space: pre;
    }

    .bubble blockquote {
      padding-left: 11px;
      border-left: 3px solid var(--accent);
      color: var(--muted);
    }

    .table-wrap {
      max-width: 100%;
      overflow-x: auto;
      margin: 0 0 0.75em;
      border: 1px solid var(--border);
      border-radius: 8px;
      -webkit-overflow-scrolling: touch;
    }

    .bubble table {
      min-width: 100%;
      border-collapse: collapse;
      font-size: 0.92em;
      white-space: nowrap;
    }

    .bubble th,
    .bubble td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    .bubble th {
      background: rgba(214, 164, 95, 0.12);
      color: #ffe2b8;
      font-weight: 650;
    }

    .bubble tr:last-child td {
      border-bottom: 0;
    }

    .task-list {
      list-style: none;
      padding-left: 0 !important;
    }

    .task-list li {
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
    }

    .task-box {
      display: inline-grid;
      place-items: center;
      width: 16px;
      height: 16px;
      margin-top: 3px;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--accent-2);
      font-size: 12px;
      line-height: 1;
    }

    .composer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 12;
      padding: 10px calc(12px + var(--safe-right)) calc(10px + var(--safe-bottom)) calc(12px + var(--safe-left));
      background: transparent;
      border-top: 0;
      pointer-events: none;
    }

    .composer-shell {
      pointer-events: auto;
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr) 40px;
      grid-template-rows: minmax(44px, auto);
      align-items: end;
      column-gap: 7px;
      max-width: 900px;
      margin: 0 auto;
      min-height: 58px;
      padding: 7px 8px;
      border: 1px solid rgba(244, 240, 234, 0.13);
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.025)),
        rgba(24, 25, 29, 0.62);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 18px 44px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(26px) saturate(160%);
      -webkit-backdrop-filter: blur(26px) saturate(160%);
    }

    .attach {
      grid-column: 1;
      grid-row: 1;
      align-self: center;
      justify-self: center;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(244, 240, 234, 0.1);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.035);
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .attach:active {
      background: rgba(255, 255, 255, 0.09);
      color: var(--text);
    }

    .attach:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .attach svg {
      width: 21px;
      height: 21px;
    }

    .file-input {
      display: none;
    }

    .attachment-preview {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr) 34px;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border: 1px solid rgba(244, 240, 234, 0.12);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.055);
    }

    .attachment-preview[hidden] {
      display: none;
    }

    .attachment-preview img,
    .message-image {
      width: 54px;
      height: 54px;
      border-radius: 7px;
      object-fit: cover;
      background: var(--surface-2);
    }

    .attachment-name {
      min-width: 0;
      color: var(--text);
      font-size: 13px;
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .attachment-size {
      margin-top: 2px;
      color: var(--subtle);
      font-size: 11px;
      line-height: 1.2;
    }

    .remove-attachment {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-size: 22px;
      line-height: 1;
    }

    .remove-attachment:active {
      background: rgba(244, 240, 234, 0.08);
      color: var(--text);
    }

    .message-attachment {
      display: grid;
      gap: 8px;
    }

    .message-attachment .message-image {
      width: min(220px, 100%);
      height: auto;
      max-height: 260px;
      aspect-ratio: auto;
    }

    .message-text {
      white-space: pre-wrap;
    }

    .input-meta {
      display: none;
    }

    .input-meta.warning {
      color: var(--accent-2);
    }

    textarea {
      grid-column: 2;
      grid-row: 1;
      width: 100%;
      max-height: 132px;
      min-height: 40px;
      align-self: center;
      overflow-y: auto;
      resize: none;
      border: 0;
      border-radius: 18px;
      padding: 9px 8px;
      background: transparent;
      color: var(--text);
      caret-color: var(--accent);
      font-size: 16px;
      line-height: 1.35;
      outline: none;
      opacity: 1;
      transition: opacity 0.14s ease;
    }

    textarea:focus {
      box-shadow: none;
    }

    textarea::placeholder {
      color: var(--subtle);
    }

    .send {
      grid-column: 3;
      grid-row: 1;
      justify-self: end;
      align-self: center;
      width: 40px;
      height: 40px;
      border-radius: 16px;
      background: var(--accent);
      color: #14110d;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .send:active {
      transform: translateY(1px);
    }

    .send:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .send.voice-active {
      background: rgba(255, 255, 255, 0.055);
      color: var(--accent);
      box-shadow: 0 0 0 1px rgba(214, 164, 95, 0.42), 0 0 18px rgba(214, 164, 95, 0.22);
    }

    .send svg {
      width: 21px;
      height: 21px;
    }

    .voice-waveform {
      grid-column: 2;
      grid-row: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      align-self: center;
      gap: 5px;
      height: 40px;
      padding: 0;
      margin: 0 auto;
      width: min(230px, 62vw);
      max-width: 100%;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .voice-waveform[hidden] {
      display: none;
    }

    .voice-waveform span {
      flex: 0 0 4px;
      width: 4px;
      max-width: 4px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent);
      opacity: 0.62;
      transform-origin: center;
      transition: height 0.08s linear, opacity 0.08s linear;
    }

    .voice-waveform.idle span,
    .voice-waveform.thinking span {
      opacity: 0.45;
    }

    .voice-waveform.thinking span {
      animation: voiceWaitingPulse 1.4s ease-in-out infinite;
    }

    .voice-waveform.thinking span:nth-child(2n) {
      animation-delay: 0.12s;
    }

    .voice-waveform.thinking span:nth-child(3n) {
      animation-delay: 0.24s;
    }

    .voice-waveform.thinking span:nth-child(4n) {
      animation-delay: 0.36s;
    }

    @keyframes voiceWaitingPulse {
      0%, 100% {
        transform: scaleY(0.72);
        opacity: 0.34;
      }
      45% {
        transform: scaleY(1.36);
        opacity: 0.62;
      }
    }

    .composer.voice-mode textarea {
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
    }

    .composer.voice-mode .attach {
      grid-column: 1;
      grid-row: 1;
      visibility: hidden;
      pointer-events: none;
    }

    .composer.voice-mode .voice-waveform {
      grid-column: 2;
      grid-row: 1;
      display: flex;
    }

    .composer.voice-mode .send {
      grid-column: 3;
      grid-row: 1;
      justify-self: end;
    }

    .composer.voice-mode .input-meta {
      display: none;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(78px + var(--safe-bottom));
      z-index: 20;
      max-width: calc(100vw - 32px);
      padding: 10px 13px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-3);
      color: var(--text);
      box-shadow: var(--shadow);
      font-size: 13px;
      line-height: 1.3;
      transform: translateX(-50%) translateY(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%);
    }

    @media (min-width: 720px) {
      .topbar {
        grid-template-columns: 72px 1fr 72px;
        padding-left: 20px;
        padding-right: 20px;
      }

      .messages {
        padding-left: 24px;
        padding-right: 24px;
      }

      .bubble {
        max-width: min(72%, 760px);
      }
    }

    .activity-feed {
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.18);
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
    }

    .activity-step {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .activity-step .step-icon {
      flex: 0 0 14px;
      font-size: 11px;
    }

    .activity-step.done .step-icon {
      color: var(--accent-2);
    }

    .activity-step.active .step-icon {
      color: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <button class="icon-button" id="topAddStrandBtn" type="button" aria-label="Open new Strand" title="Open new Strand" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path d="M12 5v14"></path>
          <path d="M5 12h14"></path>
        </svg>
      </button>
      <div class="brand">
        <h1>Cal</h1>
        <div class="status" aria-live="polite">
          <span class="status-dot busy" id="statusDot"></span>
          <span id="statusText">Loading session</span>
        </div>
      </div>
      <button class="icon-button" id="refreshBtn" type="button" aria-label="Refresh session" title="Refresh session">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
          <path d="M21 12a9 9 0 0 1-15.3 6.4"></path>
          <path d="M3 12A9 9 0 0 1 18.3 5.6"></path>
          <path d="M18 2v4h4"></path>
          <path d="M6 22v-4H2"></path>
        </svg>
      </button>
    </header>

    <nav class="strand-tabs" id="strandTabs" aria-label="Cal sessions" hidden>
      <div class="tabs-list" id="tabsList"></div>
    </nav>

    <main class="messages" id="messages" aria-live="polite">
      <section class="empty" id="emptyState">
        <div class="empty-mark">C</div>
        <h2>Hi, I am Cal.</h2>
        <p>Ready when you are.</p>
      </section>
    </main>

    <form class="composer" id="composer">
      <div class="composer-shell">
        <input class="file-input" id="fileInput" type="file" accept="image/jpeg,image/png,image/gif,image/webp,image/*">
        <button class="attach" id="attachBtn" type="button" aria-label="Attach image" title="Attach image">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path d="m21.4 11.6-8.5 8.5a6 6 0 0 1-8.5-8.5l9.2-9.2a4 4 0 1 1 5.7 5.7l-9.2 9.2a2 2 0 0 1-2.8-2.8l8.5-8.5"></path>
          </svg>
        </button>
        <textarea id="input" rows="1" maxlength="50000" autocomplete="off" autocapitalize="sentences" placeholder="Message Cal..."></textarea>
        <button class="send" id="send" type="submit" aria-label="Send message" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path d="M22 2 11 13"></path>
            <path d="m22 2-7 20-4-9-9-4 20-7Z"></path>
          </svg>
        </button>
        <div class="voice-waveform" id="voiceWaveform" hidden aria-hidden="true">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="attachment-preview" id="attachmentPreview" hidden>
          <img id="attachmentThumb" alt="">
          <div>
            <div class="attachment-name" id="attachmentName"></div>
            <div class="attachment-size" id="attachmentSize"></div>
          </div>
          <button class="remove-attachment" id="removeAttachment" type="button" aria-label="Remove image">×</button>
        </div>
        <div class="input-meta" id="inputMeta"></div>
      </div>
    </form>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <audio id="voiceAudio" autoplay></audio>

  <script src="/realtime-response-coordinator.js"></script>
  <script>
    const app = document.getElementById('app');
    const messagesEl = document.getElementById('messages');
    const emptyState = document.getElementById('emptyState');
    const input = document.getElementById('input');
    const inputMeta = document.getElementById('inputMeta');
    const sendBtn = document.getElementById('send');
    const attachBtn = document.getElementById('attachBtn');
    const fileInput = document.getElementById('fileInput');
    const attachmentPreview = document.getElementById('attachmentPreview');
    const attachmentThumb = document.getElementById('attachmentThumb');
    const attachmentName = document.getElementById('attachmentName');
    const attachmentSize = document.getElementById('attachmentSize');
    const removeAttachment = document.getElementById('removeAttachment');
    const composer = document.getElementById('composer');
    const refreshBtn = document.getElementById('refreshBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const toast = document.getElementById('toast');
    const strandTabs = document.getElementById('strandTabs');
    const tabsList = document.getElementById('tabsList');
    const topAddStrandBtn = document.getElementById('topAddStrandBtn');
    const brand = document.querySelector('.brand');
    const voiceWaveform = document.getElementById('voiceWaveform');
    const voiceBars = Array.from(voiceWaveform.querySelectorAll('span'));
    const voiceAudio = document.getElementById('voiceAudio');

    const SEND_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M22 2 11 13"></path><path d="m22 2-7 20-4-9-9-4 20-7Z"></path></svg>';
    const MIC_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v1a7 7 0 0 1-14 0v-1"></path><path d="M12 18v4"></path><path d="M8 22h8"></path></svg>';
    const STOP_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><rect x="7" y="7" width="10" height="10" rx="1"></rect></svg>';

    let toastTimer = null;
    let isProcessing = false;
    let multiSessionEnabled = false;
    let activeSessionId = null;
    const sessions = new Map();
    const sessionViews = new Map();
    const DEFAULT_SESSION_ID = '__default__';
    const MAX_INPUT_CHARS = 50000;
    const MAX_IMAGE_BYTES = 5 * 1024 * 1024;
    const VOICE_NARRATION_MIN_GAP_MS = 4500;
    const VOICE_BENCHMARK_STORAGE_KEY = 'calVoiceBenchmarks';
    const VOICE_DISCONNECT_GRACE_MS = 30000;
    const VOICE_RECONNECT_DELAY_MS = 1500;
    const VOICE_MAX_RECONNECT_ATTEMPTS = 2;
    const PWA_CLIENT_GENERATION = '2026-07-17-voice-setup-recovery-9';
    const SUPPORTED_IMAGE_TYPES = new Set(['image/jpeg', 'image/png', 'image/gif', 'image/webp']);
    let selectedImage = null;
    let selectedImageUrl = null;
    let voicePeer = null;
    let voiceChannel = null;
    let voiceMicStream = null;
    let voiceAudioContext = null;
    let voiceMicAnalyser = null;
    let voiceRemoteAnalyser = null;
    let voiceMicRaf = null;
    let voiceRemoteRaf = null;
    let voiceMicWaveformRun = 0;
    let voiceRemoteGlowRun = 0;
    let voiceActive = false;
    let voiceConnecting = false;
    let voiceSpeaking = false;
    let voiceSpeakingSince = 0;
    let voiceInputSpeaking = false;
    let voiceWaveformMode = 'idle';
    let voiceBarsResetToken = 0;
    let voiceAskInFlight = false;
    let voiceTurnMetrics = null;
    let voiceSessionMetrics = null;
    let voiceBoundSessionId = null;
    let voiceDisconnectTimer = null;
    let voiceDisconnectedAt = null;
    let voiceReconnectTimer = null;
    let voiceReconnectAttempt = 0;
    let voiceNarrationLastAt = 0;
    let voiceHasGreeted = false;
    let voiceRuntimeConfig = { userName: '' };
    let queuedVoiceToolCalls = [];
    const voiceNarratedStepKeys = new Set();
    const pendingVoiceToolArgs = new Map();
    const handledVoiceToolCalls = new Set();
    const voiceTranscriptTurnsByInputId = new Map();
    const voiceTranscriptTurnsByResponseId = new Map();
    let activeVoiceTranscriptTurn = null;
    let voiceTranscriptTurnSequence = 0;
    const recentVoiceUserMessages = [];
    const recentVoiceAssistantMessages = [];
    const voiceResponseCoordinator = createRealtimeResponseCoordinator({
      sendEvent: event => sendVoiceEvent(event),
      onLifecycle: (state, detail) => {
        recordVoiceSessionEvent(`response_coordinator_${state}`, detail);
        if (state === 'timeout') setStatus('busy', 'Voice recovering');
      },
    });
    input.maxLength = MAX_INPUT_CHARS;

    function getActiveSession() {
      return activeSessionId ? sessions.get(activeSessionId) : null;
    }

    function getCalHomeSession() {
      return Array.from(sessions.values()).find(session => session.permanent) || null;
    }

    function getFallbackSessionId(preferredSessionId = null) {
      if (preferredSessionId && sessions.has(preferredSessionId)) return preferredSessionId;
      const home = getCalHomeSession();
      return home?.sessionId || Array.from(sessions.keys())[0] || null;
    }

    function isActiveProcessing() {
      return getActiveSession()?.status === 'working' || isProcessing;
    }

    function normalizeSessionStatus(state) {
      if (state === 'processing' || state === 'working') return 'working';
      if (state === 'attention') return 'attention';
      return 'ready';
    }

    function isSessionMissingError(error) {
      return /No active session|Unknown session/i.test(String(error || ''));
    }

    function viewIdFor(sessionId) {
      return sessionId || activeSessionId || DEFAULT_SESSION_ID;
    }

    function ensureSessionView(sessionId = activeSessionId) {
      const id = viewIdFor(sessionId);
      let view = sessionViews.get(id);
      if (view) return view;

      const container = document.createElement('section');
      container.className = 'chat-session';
      container.dataset.sessionId = id;
      messagesEl.appendChild(container);

      view = {
        id,
        container,
        pendingBubble: null,
        activityFeed: null,
      };
      sessionViews.set(id, view);
      showActiveSessionView();
      return view;
    }

    function migrateDefaultView(sessionId) {
      if (!sessionId || sessionId === DEFAULT_SESSION_ID || !sessionViews.has(DEFAULT_SESSION_ID) || sessionViews.has(sessionId)) {
        return;
      }
      const view = sessionViews.get(DEFAULT_SESSION_ID);
      sessionViews.delete(DEFAULT_SESSION_ID);
      view.id = sessionId;
      view.container.dataset.sessionId = sessionId;
      sessionViews.set(sessionId, view);
    }

    function getSessionView(sessionId = activeSessionId) {
      return ensureSessionView(sessionId);
    }

    function showActiveSessionView(options = {}) {
      const activeId = viewIdFor(activeSessionId);
      for (const [id, view] of sessionViews.entries()) {
        view.container.classList.toggle('active', id === activeId);
      }
      updateEmptyState();
      if (options.scrollToBottom) {
        scrollActiveSessionToBottom();
      }
    }

    function updateEmptyState() {
      const activeView = sessionViews.get(viewIdFor(activeSessionId));
      emptyState.hidden = Boolean(activeView && activeView.container.childElementCount > 0);
    }

    function shouldSyncSessionView(sessionId) {
      const view = sessionViews.get(viewIdFor(sessionId));
      return !view || (view.container.childElementCount === 0 && !view.pendingBubble);
    }

    function removeStaleSessionViews(activeIds) {
      for (const [id, view] of sessionViews.entries()) {
        if (id === DEFAULT_SESSION_ID || activeIds.has(id)) continue;
        view.container.remove();
        sessionViews.delete(id);
      }
      showActiveSessionView();
    }

    function clearPendingResponse(sessionId = activeSessionId) {
      const view = sessionViews.get(viewIdFor(sessionId));
      if (!view) return;
      if (view.pendingBubble) {
        view.pendingBubble.remove();
        view.pendingBubble = null;
      }
      view.activityFeed = null;
      updateEmptyState();
    }

    function updateActivePlaceholder() {
      const active = getActiveSession();
      input.placeholder = `Message ${active?.name || 'Cal'}...`;
    }

    function upsertSession(session) {
      if (!session || !session.sessionId) return;
      const existing = sessions.get(session.sessionId) || {};
      sessions.set(session.sessionId, {
        ...existing,
        ...session,
        status: normalizeSessionStatus(session.status || existing.status || 'ready'),
      });
      if (!activeSessionId) activeSessionId = session.sessionId;
      ensureSessionView(session.sessionId);
    }

    function setActiveSession(sessionId, options = {}) {
      if (!sessionId || !sessions.has(sessionId)) return;
      activeSessionId = sessionId;
      ensureSessionView(sessionId);
      showActiveSessionView({ scrollToBottom: true });
      renderTabs();
      updateActiveStatus();
      updateActivePlaceholder();
      if (options.sync !== false && shouldSyncSessionView(sessionId)) {
        syncActiveHistory();
      }
    }

    function renderTabs() {
      const list = Array.from(sessions.values());
      const strandCount = list.filter(item => !item.permanent).length;
      const showTabs = multiSessionEnabled && list.length > 1;
      strandTabs.hidden = !showTabs;
      topAddStrandBtn.hidden = !multiSessionEnabled || strandCount >= 3;
      topAddStrandBtn.disabled = strandCount >= 3;
      app.classList.toggle('has-strands', showTabs);
      tabsList.textContent = '';

      for (const session of list) {
        const tab = document.createElement('button');
        tab.type = 'button';
        tab.className = 'session-tab ' +
          (session.sessionId === activeSessionId ? 'active ' : '') +
          (session.permanent ? 'permanent ' : '') +
          session.status;
        tab.dataset.sessionId = session.sessionId;
        tab.setAttribute('aria-label', session.name);
        tab.innerHTML = `<span class="tab-dot"></span><span class="tab-name">${escapeHtml(session.name)}</span>`;

        if (!session.permanent) {
          const close = document.createElement('span');
          close.className = 'close-tab';
          close.textContent = '×';
          close.setAttribute('aria-hidden', 'true');
          tab.appendChild(close);
        }

        tab.addEventListener('click', event => {
          if (event.target.closest('.close-tab')) {
            closeSession(session.sessionId);
            return;
          }
          setActiveSession(session.sessionId);
        });

        let pressTimer = null;
        tab.addEventListener('pointerdown', () => {
          if (session.permanent) return;
          pressTimer = setTimeout(() => closeSession(session.sessionId), 650);
        });
        ['pointerup', 'pointerleave', 'pointercancel'].forEach(type => {
          tab.addEventListener(type, () => {
            clearTimeout(pressTimer);
            pressTimer = null;
          });
        });

        tabsList.appendChild(tab);
      }

    }

    function updateActiveStatus() {
      const active = getActiveSession();
      if (!active) {
        isProcessing = false;
        setStatus('error', 'No active session');
        return;
      }
      isProcessing = active.status === 'working';
      if (active.status === 'attention') {
        setStatus('attention', 'Needs input');
      } else {
        setStatus(isProcessing ? 'busy' : 'online', isProcessing ? 'Working' : 'Ready');
      }
    }

    function syncActiveHistory() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'sync', sessionId: activeSessionId }));
      } else {
        loadHistoryHttp(activeSessionId);
      }
    }

    // --- WebSocket Connection ---
    const WS_ORIGIN = window.location.protocol === 'file:'
      ? 'ws://127.0.0.1:8080'
      : `${window.location.protocol === 'https:' ? 'wss' : 'ws'}://${window.location.host}`;
    const API_ORIGIN = window.location.protocol === 'file:' ? 'http://127.0.0.1:8080' : '';

    let ws = null;
    let wsReconnectDelay = 1000;
    const WS_MAX_DELAY = 16000;

    function wsConnect() {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;

      ws = new WebSocket(WS_ORIGIN + '/ws');

      ws.addEventListener('open', () => {
        console.log('[WS] Connected');
        wsReconnectDelay = 1000;
        setStatus('online', 'Connected');
        loadSessions();
        // Request history sync on connect
        ws.send(JSON.stringify({ type: 'sync', sessionId: activeSessionId }));
      });

      ws.addEventListener('message', (event) => {
        let msg;
        try { msg = JSON.parse(event.data); } catch { return; }
        handleServerEvent(msg);
      });

      ws.addEventListener('close', () => {
        console.log('[WS] Disconnected');
        ws = null;
        if (!isProcessing) {
          setStatus('error', 'Disconnected');
          refreshHttpConnectivityAfterWsClose();
        }
        scheduleReconnect();
      });

      ws.addEventListener('error', () => {
        // Error fires before close — just let close handle reconnection
      });
    }

    function scheduleReconnect() {
      setTimeout(() => {
        wsConnect();
      }, wsReconnectDelay);
      wsReconnectDelay = Math.min(wsReconnectDelay * 2, WS_MAX_DELAY);
    }

    function wsSend(msg) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(msg));
        return true;
      }
      return false;
    }

    // --- Handle Server Events ---
    function handleServerEvent(msg) {
      switch (msg.type) {
        case 'sessions':
          applySessions(msg.sessions || []);
          break;

        case 'status':
          if (msg.sessionId && sessions.has(msg.sessionId)) {
            const session = sessions.get(msg.sessionId);
            session.status = normalizeSessionStatus(msg.state);
            renderTabs();
            if (msg.sessionId !== activeSessionId) break;
          }
          if (msg.state === 'processing') {
            isProcessing = true;
            setStatus('busy', 'Working');
          } else if (msg.state === 'attention') {
            isProcessing = false;
            setStatus('attention', 'Needs input');
          } else if (msg.state === 'idle') {
            isProcessing = false;
            setStatus('online', 'Ready');
          }
          break;

        case 'history':
          renderHistory(msg);
          break;

        case 'run_started':
          {
            const sessionId = msg.sessionId || activeSessionId;
            const view = getSessionView(sessionId);
            if (voiceAskInFlight && (!msg.sessionId || msg.sessionId === voiceBoundSessionId)) {
              markVoiceMetric('calRunStarted', { runId: msg.runId || null });
            }
            clearPendingResponse(sessionId);

            if (msg.sessionId && sessions.has(msg.sessionId)) {
              sessions.get(msg.sessionId).status = 'working';
              renderTabs();
            }

            if (!msg.sessionId || msg.sessionId === activeSessionId) {
              isProcessing = true;
              setStatus('busy', 'Working');
            }

            view.pendingBubble = addMessage('', 'assistant', { pending: true, sessionId });
            view.activityFeed = document.createElement('div');
            view.activityFeed.className = 'activity-feed';
            view.pendingBubble.querySelector('.bubble').appendChild(view.activityFeed);
          }
          break;

        case 'step_started':
          {
            const view = getSessionView(msg.sessionId || activeSessionId);
            addVoiceActivityMetric('step_started', msg);
            maybeNarrateVoiceStep(msg);
            if (view.activityFeed) {
              const step = document.createElement('div');
              step.className = 'activity-step active';
              step.dataset.tool = msg.tool;
              step.innerHTML = `<span class="step-icon">●</span><span>${escapeHtml(msg.description || msg.tool)}</span>`;
              view.activityFeed.appendChild(step);
              if (!msg.sessionId || msg.sessionId === activeSessionId) scrollToBottom();
            }
          }
          break;

        case 'step_finished':
          {
            const view = getSessionView(msg.sessionId || activeSessionId);
            addVoiceActivityMetric('step_finished', msg);
            if (view.activityFeed) {
              const activeStep = view.activityFeed.querySelector(`.activity-step.active[data-tool="${msg.tool}"]`);
              if (activeStep) {
                activeStep.classList.remove('active');
                activeStep.classList.add('done');
                activeStep.querySelector('.step-icon').textContent = '✓';
              }
            }
          }
          break;

        case 'text_done':
          {
            const sessionId = msg.sessionId || activeSessionId;
            const fullText = msg.fullText || 'No response';
            if (voiceAskInFlight && (!msg.sessionId || msg.sessionId === voiceBoundSessionId)) {
              markVoiceMetric('pwaTextDone', { runId: msg.runId || null, charCount: fullText.length });
            }
            clearPendingResponse(sessionId);
            addAssistantMessageOnce(fullText, sessionId, { rememberVoice: true });
            if (!msg.sessionId || msg.sessionId === activeSessionId) {
              isProcessing = false;
              setStatus('online', 'Ready');
            }
          }
          break;

        case 'run_finished':
          if (msg.sessionId && sessions.has(msg.sessionId)) {
            sessions.get(msg.sessionId).status = 'ready';
            renderTabs();
          }
          if (!msg.sessionId || msg.sessionId === activeSessionId) {
            isProcessing = false;
            setStatus('online', 'Ready');
          }
          break;

        case 'run_error':
          if (msg.staleSession || isSessionMissingError(msg.error)) {
            recoverMissingSession(msg.sessionId, msg.sessions);
            break;
          }
          if (msg.sessionId && sessions.has(msg.sessionId)) {
            sessions.get(msg.sessionId).status = 'ready';
            renderTabs();
          }
          clearPendingResponse(msg.sessionId || activeSessionId);
          addMessage('Error: ' + (msg.error || 'Something went wrong'), 'assistant', { sessionId: msg.sessionId || activeSessionId });
          if (!msg.sessionId || msg.sessionId === activeSessionId) {
            isProcessing = false;
            setStatus('error', 'Error');
          }
          break;

        case 'proactive':
          addMessage(msg.text, 'assistant', { sessionId: msg.sessionId || activeSessionId });
          showToast('New message from Cal');
          break;

        case 'error':
          console.warn('[WS] Server error:', msg.error);
          break;
      }
    }

    function applySessions(serverSessions) {
      if (!serverSessions.length) return;
      multiSessionEnabled = true;
      const previousActive = activeSessionId;
      sessions.clear();
      activeSessionId = null;
      for (const session of serverSessions) upsertSession(session);
      activeSessionId = getFallbackSessionId(previousActive);
      removeStaleSessionViews(new Set(serverSessions.map(session => session.sessionId)));
      ensureSessionView(activeSessionId);
      showActiveSessionView();
      renderTabs();
      updateActivePlaceholder();
      updateActiveStatus();
    }

    async function recoverMissingSession(sessionId, serverSessions = null) {
      const wasActive = !sessionId || sessionId === activeSessionId;
      const missingName = sessions.get(sessionId)?.name || 'That Strand';
      clearPendingResponse(sessionId || activeSessionId);

      if (Array.isArray(serverSessions) && serverSessions.length) {
        applySessions(serverSessions);
      } else {
        await loadSessions();
      }

      if (sessionId && sessions.has(sessionId)) {
        sessions.get(sessionId).status = 'ready';
        renderTabs();
        updateActiveStatus();
        return;
      }

      if (wasActive) {
        const nextSessionId = getFallbackSessionId();
        if (nextSessionId) {
          setActiveSession(nextSessionId);
        } else {
          activeSessionId = null;
          renderTabs();
          updateActivePlaceholder();
          setStatus('error', 'No active session');
        }
        showToast(`${missingName} is no longer active. Switched back to Cal.`);
      }

      isProcessing = false;
      input.disabled = false;
      autoSizeInput();
    }

    function renderHistory(data) {
      if (data.sessionId && !activeSessionId) {
        migrateDefaultView(data.sessionId);
        upsertSession({
          sessionId: data.sessionId,
          name: 'Cal',
          status: 'ready',
          permanent: true,
        });
        activeSessionId = data.sessionId;
      }
      const sessionId = data.sessionId || activeSessionId;
      const view = getSessionView(sessionId);
      clearMessages(sessionId);
      let dividerInserted = false;
      for (const message of data.messages || []) {
        if (!dividerInserted && !message.preReset) {
          const hasPreReset = (data.messages || []).some(m => m.preReset);
          if (hasPreReset) {
            const divider = document.createElement('div');
            divider.className = 'session-divider';
            divider.textContent = 'session refreshed';
            view.container.appendChild(divider);
          }
          dividerInserted = true;
        }
        addMessage(message.content, message.role, {
          preReset: message.preReset,
          sessionId,
          attachments: message.attachments || [],
        });
      }
      const visibleCount = (data.messages || []).length;
      if (!data.sessionId || data.sessionId === activeSessionId) {
        setStatus('online', visibleCount ? visibleCount + ' messages' : 'Ready');
      }
    }

    // --- Send Message ---
    async function sendMessage() {
      const text = input.value.trim();
      const image = selectedImage;
      const imageUrl = selectedImageUrl;
      if (voiceActive || voiceConnecting) {
        stopVoiceSession();
        return;
      }
      if (!text && !image) {
        toggleVoiceSession();
        return;
      }
      const targetSessionId = activeSessionId;

      if (multiSessionEnabled && (!activeSessionId || !sessions.has(activeSessionId))) {
        await recoverMissingSession(activeSessionId);
        return;
      }
      if (isActiveProcessing()) {
        if (image) {
          showToast('Wait for Cal to finish before sending an image.');
          return;
        }
        // Steering: send as steer event while Cal is working
        wsSend({ type: 'steer', sessionId: targetSessionId, text });
        addMessage(text, 'user', { sessionId: targetSessionId });
        input.value = '';
        autoSizeInput();
        showToast('Steering sent');
        return;
      }

      addMessage(text || 'Image attached', 'user', {
        sessionId: targetSessionId,
        imageUrl,
        imageName: image?.name,
      });
      input.value = '';
      if (image) clearAttachment({ revoke: false });
      autoSizeInput();

      if (image) {
        await sendMessageHttp(text, image);
        return;
      }

      const sent = wsSend({ type: 'message', sessionId: targetSessionId, text });
      if (!sent) {
        // Fallback to HTTP if WebSocket not connected
        sendMessageHttp(text);
        return;
      }
    }

    async function sendMessageHttp(text, image = null) {
      const targetSessionId = activeSessionId;
      isProcessing = true;
      input.disabled = true;
      attachBtn.disabled = true;
      setStatus('busy', 'Thinking');
      const loading = addMessage('Cal is thinking...', 'assistant', { pending: true, sessionId: targetSessionId });

      try {
        let response;
        const buildRequest = () => {
          if (!image) {
            return {
              headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
              body: JSON.stringify({ message: text }),
            };
          }

          const form = new FormData();
          form.append('message', text || '');
          form.append('image', image, image.name || 'image');
          return {
            headers: { Accept: 'application/json' },
            body: form,
          };
        };

        const sendTargets = [];
        if (multiSessionEnabled && targetSessionId) {
          sendTargets.push(`/api/sessions/${encodeURIComponent(targetSessionId)}/message`);
        }
        sendTargets.push('/api/chat/send');
        if (!image) sendTargets.push('/');

        let lastError = null;
        for (const target of sendTargets) {
          try {
            response = await fetch(apiUrl(target), {
              method: 'POST',
              ...buildRequest(),
              cache: 'no-store',
            });
            if (response.status !== 404) break;
            lastError = new Error(`Route not found: ${target}`);
          } catch (error) {
            lastError = error;
            response = null;
          }
        }
        if (!response) throw lastError || new Error('Could not reach Cal');
        const data = await readJsonResponse(response, 'Could not send message');
        loading.remove();
        addAssistantMessageOnce(data.message || 'No response', targetSessionId);
        if (!targetSessionId || targetSessionId === activeSessionId) setStatus('online', 'Ready');
      } catch (error) {
        loading.remove();
        if (error.data?.staleSession || isSessionMissingError(error.message)) {
          await recoverMissingSession(targetSessionId, error.data?.sessions);
          return;
        }
        addMessage('Error: ' + (error.message || 'Could not reach Cal'), 'assistant', { sessionId: targetSessionId });
        if (!targetSessionId || targetSessionId === activeSessionId) setStatus('error', 'Offline');
      } finally {
        isProcessing = false;
        input.disabled = false;
        attachBtn.disabled = false;
        autoSizeInput();
        input.focus({ preventScroll: true });
      }
    }

    async function refreshHttpConnectivityAfterWsClose() {
      try {
        const response = await fetch(apiUrl('/api/sessions'), {
          headers: { Accept: 'application/json' },
          cache: 'no-store',
        });
        if (!response.ok) return;
        const data = await response.json();
        applySessions(data.sessions || []);
        updateActiveStatus();
      } catch {
        // Keep the disconnected status when both WebSocket and HTTP are unavailable.
      }
    }

    async function loadSessions() {
      try {
        const response = await fetch(apiUrl('/api/sessions'), {
          headers: { Accept: 'application/json' },
          cache: 'no-store',
        });
        if (!response.ok) return;
        const data = await response.json();
        applySessions(data.sessions || []);
      } catch {
        // Feature flag is probably off or the gateway is offline.
      }
    }

    async function createStrand() {
      if (!multiSessionEnabled) return;
      topAddStrandBtn.disabled = true;
      try {
        const response = await fetch(apiUrl('/api/sessions'), {
          method: 'POST',
          headers: { Accept: 'application/json' },
        });
        const data = await readJsonResponse(response, 'Could not create Strand');
        applySessions(data.sessions || []);
        if (data.session?.sessionId) {
          setActiveSession(data.session.sessionId);
        }
      } catch (error) {
        showToast(error.message || 'Could not create Strand');
      } finally {
        renderTabs();
      }
    }

    async function closeSession(sessionId) {
      const session = sessions.get(sessionId);
      if (!session || session.permanent) return;

      try {
        const response = await fetch(apiUrl(`/api/sessions/${encodeURIComponent(sessionId)}`), {
          method: 'DELETE',
          headers: { Accept: 'application/json' },
        });
        const data = await readJsonResponse(response, `Could not close ${session.name}`);
        applySessions(data.sessions || []);
        const nextSessionId = getFallbackSessionId();
        if (nextSessionId) {
          setActiveSession(nextSessionId);
        }
        showToast(`${session.name} closed`);
      } catch (error) {
        showToast(error.message || `Could not close ${session.name}`);
      }
    }

    async function loadHistoryHttp(sessionId) {
      try {
        const query = sessionId ? `?sessionId=${encodeURIComponent(sessionId)}` : '';
        const response = await fetch(apiUrl('/api/session/history' + query), {
          headers: { Accept: 'application/json' },
        });
        const data = await readJsonResponse(response, 'Could not load session');
        renderHistory(data);
      } catch (error) {
        showToast(error.message || 'Could not load session');
      }
    }

    // --- Utilities ---
    function escapeHtml(value) {
      const div = document.createElement('div');
      div.textContent = value || '';
      return div.innerHTML;
    }

    function renderInlineMarkdown(value) {
      return value
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>')
        .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
    }

    function renderMarkdown(text) {
      const escaped = escapeHtml(text).replace(/\r\n/g, '\n');
      const blocks = [];
      let inCode = false;
      let codeLines = [];
      let listLines = [];
      let tableRows = [];
      let paragraph = [];

      function flushParagraph() {
        if (paragraph.length) {
          blocks.push('<p>' + renderInlineMarkdown(paragraph.join(' ')) + '</p>');
          paragraph = [];
        }
      }

      function flushList() {
        if (listLines.length) {
          const hasTasks = listLines.some(item => item.task);
          const className = hasTasks ? ' class="task-list"' : '';
          blocks.push('<ul' + className + '>' + listLines.map(item => {
            if (!item.task) {
              return '<li>' + renderInlineMarkdown(item.text) + '</li>';
            }

            const mark = item.checked ? 'x' : '';
            return '<li><span class="task-box">' + mark + '</span><span>' + renderInlineMarkdown(item.text) + '</span></li>';
          }).join('') + '</ul>');
          listLines = [];
        }
      }

      function isTableLine(line) {
        return line.includes('|') && !line.startsWith('&gt; ');
      }

      function isTableDivider(line) {
        return /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(line);
      }

      function tableCells(line) {
        return line.trim().replace(/^\|/, '').replace(/\|$/, '').split('|').map(cell => cell.trim());
      }

      function flushTable() {
        if (!tableRows.length) return;

        if (tableRows.length >= 2 && isTableDivider(tableRows[1])) {
          const headers = tableCells(tableRows[0]);
          const bodyRows = tableRows.slice(2).map(tableCells);
          const thead = '<thead><tr>' + headers.map(cell => '<th>' + renderInlineMarkdown(cell) + '</th>').join('') + '</tr></thead>';
          const tbody = '<tbody>' + bodyRows.map(row => (
            '<tr>' + row.map(cell => '<td>' + renderInlineMarkdown(cell) + '</td>').join('') + '</tr>'
          )).join('') + '</tbody>';
          blocks.push('<div class="table-wrap"><table>' + thead + tbody + '</table></div>');
        } else {
          for (const row of tableRows) {
            paragraph.push(row);
          }
        }

        tableRows = [];
      }

      for (const rawLine of escaped.split('\n')) {
        const line = rawLine.trimEnd();

        if (line.startsWith('```')) {
          if (inCode) {
            blocks.push('<pre><code>' + codeLines.join('\n') + '</code></pre>');
            codeLines = [];
            inCode = false;
          } else {
            flushParagraph();
            flushList();
            flushTable();
            inCode = true;
          }
          continue;
        }

        if (inCode) {
          codeLines.push(line);
          continue;
        }

        if (!line.trim()) {
          flushParagraph();
          flushList();
          flushTable();
          continue;
        }

        if (isTableLine(line)) {
          flushParagraph();
          flushList();
          tableRows.push(line);
          continue;
        }

        const heading = line.match(/^(#{1,3})\s+(.+)$/);
        if (heading) {
          flushParagraph();
          flushList();
          flushTable();
          const level = heading[1].length;
          blocks.push('<h' + level + '>' + renderInlineMarkdown(heading[2]) + '</h' + level + '>');
          continue;
        }

        const bullet = line.match(/^[-*]\s+(\[[ xX]\]\s+)?(.+)$/);
        if (bullet) {
          flushParagraph();
          flushTable();
          listLines.push({
            task: Boolean(bullet[1]),
            checked: /\[[xX]\]/.test(bullet[1] || ''),
            text: bullet[2],
          });
          continue;
        }

        if (line.startsWith('&gt; ')) {
          flushParagraph();
          flushList();
          flushTable();
          blocks.push('<blockquote>' + renderInlineMarkdown(line.slice(5)) + '</blockquote>');
          continue;
        }

        flushList();
        flushTable();
        paragraph.push(line);
      }

      flushParagraph();
      flushList();
      flushTable();

      if (inCode) {
        blocks.push('<pre><code>' + codeLines.join('\n') + '</code></pre>');
      }

      return blocks.join('');
    }

    function setStatus(kind, text) {
      statusDot.className = 'status-dot ' + kind;
      statusText.textContent = text;
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    function apiUrl(path) {
      return API_ORIGIN + path;
    }

    function isVoiceModeAvailable() {
      return input.value.trim().length === 0 && !selectedImage;
    }

    function updateComposerAction() {
      const textMode = !isVoiceModeAvailable();
      const voiceMode = voiceActive || voiceConnecting;
      composer.classList.toggle('voice-mode', voiceMode);
      attachBtn.disabled = voiceMode || isProcessing;
      if (voiceMode) {
        sendBtn.innerHTML = STOP_ICON;
        sendBtn.disabled = false;
        sendBtn.classList.add('voice-active');
        sendBtn.setAttribute('aria-label', 'Stop voice');
        sendBtn.title = 'Stop voice';
        updateComposerSpace();
        return;
      }

      sendBtn.classList.remove('voice-active');
      if (textMode) {
        sendBtn.innerHTML = SEND_ICON;
        sendBtn.disabled = input.value.trim().length === 0 && !selectedImage;
        sendBtn.setAttribute('aria-label', 'Send message');
        sendBtn.title = 'Send message';
      } else {
        sendBtn.innerHTML = MIC_ICON;
        sendBtn.disabled = false;
        sendBtn.setAttribute('aria-label', 'Start voice');
        sendBtn.title = 'Start voice';
      }
      updateComposerSpace();
    }

    function updateComposerSpace() {
      requestAnimationFrame(() => {
        const height = Math.ceil(composer.getBoundingClientRect().height + 14);
        document.documentElement.style.setProperty('--composer-space', `${height}px`);
      });
    }

    function normalizeMessageText(text) {
      return String(text || '').replace(/\s+/g, ' ').trim();
    }

    function rememberRecent(list, text, sessionId = activeSessionId) {
      const normalized = normalizeMessageText(text);
      if (!normalized) return;
      list.push({ text: normalized, sessionId: viewIdFor(sessionId), at: Date.now() });
      while (list.length > 8) list.shift();
    }

    function wasRecentlyAdded(list, text, sessionId = activeSessionId, windowMs = 20000) {
      const normalized = normalizeMessageText(text);
      if (!normalized) return false;
      const viewId = viewIdFor(sessionId);
      const now = Date.now();
      return list.some(item => item.text === normalized && item.sessionId === viewId && now - item.at < windowMs);
    }

    function hasVisibleMessage(role, text, sessionId = activeSessionId) {
      const normalized = normalizeMessageText(text);
      if (!normalized) return false;
      const views = [
        sessionViews.get(viewIdFor(sessionId)),
        sessionViews.get(viewIdFor(activeSessionId)),
      ].filter(Boolean);
      const uniqueViews = [...new Set(views)];
      return uniqueViews.some(view => {
        const messages = Array.from(view.container.querySelectorAll(`.message.${role}:not(.pending) .bubble`)).slice(-8);
        return messages.some(node => normalizeMessageText(node.textContent) === normalized);
      });
    }

    function addAssistantMessageOnce(text, sessionId = activeSessionId, options = {}) {
      const normalized = normalizeMessageText(text);
      if (!normalized) return null;
      const recentlyAdded = wasRecentlyAdded(recentVoiceAssistantMessages, normalized, sessionId);
      const alreadyVisible = hasVisibleMessage('assistant', normalized, sessionId);
      if (options.rememberVoice) rememberRecent(recentVoiceAssistantMessages, normalized, sessionId);
      if (recentlyAdded || alreadyVisible) return null;
      const row = addMessage(text, 'assistant', { sessionId });
      if (!options.rememberVoice) rememberRecent(recentVoiceAssistantMessages, normalized, sessionId);
      return row;
    }

    function addVoiceUserMessage(text, sessionId = activeSessionId) {
      const normalized = normalizeMessageText(text);
      if (!normalized || wasRecentlyAdded(recentVoiceUserMessages, normalized, sessionId) || hasVisibleMessage('user', normalized, sessionId)) return;
      addMessage(normalized, 'user', { sessionId });
      rememberRecent(recentVoiceUserMessages, normalized, sessionId);
    }

    function addVoiceAssistantMessage(text, sessionId = activeSessionId) {
      addAssistantMessageOnce(text, sessionId, { rememberVoice: true });
    }

    function setVoiceSpeaking(isSpeaking) {
      voiceSpeaking = isSpeaking;
      if (isSpeaking) voiceSpeakingSince = Date.now();
      brand.classList.toggle('voice-speaking', isSpeaking);
    }

    function startVoiceTurnMetrics(reason = 'voice') {
      voiceTurnMetrics = {
        id: `voice-${Date.now().toString(36)}`,
        kind: 'turn',
        voiceSessionId: voiceSessionMetrics?.id || null,
        reason,
        sessionId: voiceBoundSessionId,
        wallStartedAt: new Date().toISOString(),
        startedAt: performance.now(),
        marks: {},
        activities: [],
      };
      voiceNarratedStepKeys.clear();
      voiceNarrationLastAt = 0;
      return voiceTurnMetrics;
    }

    function ensureVoiceTurnMetrics(reason = 'voice') {
      return voiceTurnMetrics || startVoiceTurnMetrics(reason);
    }

    function markVoiceMetric(name, extra = {}) {
      const metrics = ensureVoiceTurnMetrics(name);
      if (!metrics.marks[name]) {
        metrics.marks[name] = { at: performance.now() - metrics.startedAt, ...extra };
      } else {
        metrics.marks[name] = { ...metrics.marks[name], ...extra };
      }
      return metrics;
    }

    function addVoiceActivityMetric(kind, msg = {}) {
      if (!voiceTurnMetrics || !voiceAskInFlight) return;
      const sessionId = msg.sessionId || voiceBoundSessionId;
      if (sessionId && voiceBoundSessionId && sessionId !== voiceBoundSessionId) return;
      voiceTurnMetrics.activities.push({
        kind,
        at: Math.round(performance.now() - voiceTurnMetrics.startedAt),
        runId: msg.runId || null,
        tool: msg.tool || null,
        description: msg.description || msg.tool || '',
        inputSummary: msg.inputSummary || null,
        durationMs: Number.isFinite(msg.durationMs) ? msg.durationMs : null,
        isError: !!msg.isError,
      });
    }

    function readStoredVoiceBenchmarks() {
      try {
        return JSON.parse(localStorage.getItem(VOICE_BENCHMARK_STORAGE_KEY) || '[]');
      } catch {
        return [];
      }
    }

    function saveVoiceBenchmark(reason = 'updated') {
      if (!voiceTurnMetrics) return;
      const metrics = {
        ...voiceTurnMetrics,
        reason,
        savedAt: new Date().toISOString(),
        totalMs: Math.round(performance.now() - voiceTurnMetrics.startedAt),
      };
      const history = readStoredVoiceBenchmarks()
        .filter(item => item.id !== metrics.id)
        .concat(metrics)
        .slice(-25);
      try {
        localStorage.setItem(VOICE_BENCHMARK_STORAGE_KEY, JSON.stringify(history));
      } catch {}

      const marks = metrics.marks || {};
      const speechToAskMs = marks.askAgentFetchStart && marks.speechStopped
        ? Math.round(marks.askAgentFetchStart.at - marks.speechStopped.at)
        : null;
      const calMs = marks.askAgentFetchEnd && marks.askAgentFetchStart
        ? Math.round(marks.askAgentFetchEnd.at - marks.askAgentFetchStart.at)
        : null;
      const answerToAudioMs = marks.firstAudioDelta && marks.askAgentFetchEnd
        ? Math.round(marks.firstAudioDelta.at - marks.askAgentFetchEnd.at)
        : null;
      const summary = {
        totalMs: metrics.totalMs,
        speechToAskMs,
        calMs,
        answerToAudioMs,
        toolEvents: metrics.activities.length,
        reason,
      };
      console.info('[Cal Voice Benchmark]', summary, metrics);
      fetch(apiUrl('/voice/benchmarks'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(metrics),
      }).catch(() => {});
    }

    function voiceConnectionSnapshot(peer = voicePeer, channel = voiceChannel) {
      return {
        connectionState: peer?.connectionState || null,
        iceConnectionState: peer?.iceConnectionState || null,
        iceGatheringState: peer?.iceGatheringState || null,
        signalingState: peer?.signalingState || null,
        channelState: channel?.readyState || null,
        microphoneState: voiceMicStream?.getAudioTracks?.()[0]?.readyState || null,
        voiceActive,
        voiceConnecting,
        voiceInputSpeaking,
        voiceAskInFlight,
        visibilityState: document.visibilityState,
        online: navigator.onLine,
      };
    }

    function startVoiceSessionMetrics() {
      voiceSessionMetrics = {
        id: `voice-session-${Date.now().toString(36)}`,
        kind: 'session_lifecycle',
        sessionId: voiceBoundSessionId,
        wallStartedAt: new Date().toISOString(),
        startedAt: performance.now(),
        events: [],
      };
      recordVoiceSessionEvent('session_start');
      return voiceSessionMetrics;
    }

    function recordVoiceSessionEvent(name, detail = {}, peer = voicePeer, channel = voiceChannel) {
      if (!voiceSessionMetrics) return;
      voiceSessionMetrics.events.push({
        name,
        at: Math.round(performance.now() - voiceSessionMetrics.startedAt),
        wallAt: new Date().toISOString(),
        ...voiceConnectionSnapshot(peer, channel),
        ...detail,
      });
      if (voiceSessionMetrics.events.length > 80) voiceSessionMetrics.events.shift();
    }

    async function recordVoiceTransportStats(name, peer = voicePeer, channel = voiceChannel) {
      if (!voiceSessionMetrics || !peer) return;
      try {
        const reports = await peer.getStats();
        let pair = null;
        let transport = null;
        const audio = [];
        for (const report of reports.values()) {
          if (report.type === 'transport') transport = report;
          if (
            report.type === 'candidate-pair'
            && report.state === 'succeeded'
            && (report.nominated || report.selected)
          ) {
            pair = report;
          }
          if (
            (report.type === 'inbound-rtp' || report.type === 'outbound-rtp')
            && report.kind === 'audio'
          ) {
            audio.push({
              direction: report.type === 'inbound-rtp' ? 'inbound' : 'outbound',
              bytes: report.type === 'inbound-rtp' ? report.bytesReceived : report.bytesSent,
              packets: report.type === 'inbound-rtp' ? report.packetsReceived : report.packetsSent,
              packetsLost: report.packetsLost ?? null,
              jitter: report.jitter ?? null,
            });
          }
        }
        if (transport?.selectedCandidatePairId) {
          pair = reports.get(transport.selectedCandidatePairId) || pair;
        }
        const local = pair?.localCandidateId ? reports.get(pair.localCandidateId) : null;
        const remote = pair?.remoteCandidateId ? reports.get(pair.remoteCandidateId) : null;
        recordVoiceSessionEvent(name, {
          transport: {
            pairState: pair?.state || null,
            nominated: pair?.nominated ?? null,
            currentRoundTripTime: pair?.currentRoundTripTime ?? null,
            availableOutgoingBitrate: pair?.availableOutgoingBitrate ?? null,
            bytesSent: pair?.bytesSent ?? null,
            bytesReceived: pair?.bytesReceived ?? null,
            localCandidateType: local?.candidateType || null,
            localProtocol: local?.protocol || null,
            localNetworkType: local?.networkType || null,
            localRelayProtocol: local?.relayProtocol || null,
            remoteCandidateType: remote?.candidateType || null,
            remoteProtocol: remote?.protocol || null,
            audio,
          },
        }, peer, channel);
      } catch (err) {
        recordVoiceSessionEvent(`${name}_error`, {
          errorName: err.name || null,
          errorMessage: err.message || String(err),
        }, peer, channel);
      }
    }

    function classifyVoiceSessionClose(reason, snapshot, metrics) {
      const categories = {
        manual_stop: 'manual',
        setup_error: 'setup_error',
        microphone_track_ended: 'microphone_ended',
        data_channel_closed: 'data_channel_closed',
        peer_failed: 'transport_failure',
        peer_disconnected: 'network_disconnect',
        peer_disconnect_timeout: 'network_disconnect',
        peer_closed: 'peer_closed',
      };
      const sawChannelError = metrics.events.some(event => event.name === 'data_channel_error');
      const sawIceError = metrics.events.some(event => event.name === 'ice_candidate_error');
      const opened = metrics.events.some(event => event.name === 'data_channel_open');
      let category = categories[reason] || 'unknown';
      if (reason !== 'manual_stop' && sawChannelError) {
        category = 'data_channel_error';
      } else if (
        sawIceError
        && ['setup_error', 'peer_failed', 'peer_disconnected'].includes(reason)
      ) {
        category = 'ice_error';
      }
      return {
        reason,
        category,
        phase: opened ? 'active' : 'connecting',
        elapsedMs: Math.round(performance.now() - metrics.startedAt),
        finalState: snapshot,
      };
    }

    function persistVoiceSessionMetrics(reason, detail = {}, { final = true, useBeacon = false } = {}) {
      if (!voiceSessionMetrics) return;
      const metrics = voiceSessionMetrics;
      recordVoiceSessionEvent(final ? 'session_closed' : 'session_snapshot', { reason, ...detail });
      const snapshot = voiceConnectionSnapshot();
      const payload = {
        ...metrics,
        reason,
        savedAt: new Date().toISOString(),
        totalMs: Math.round(performance.now() - metrics.startedAt),
        final,
        diagnosis: classifyVoiceSessionClose(reason, snapshot, metrics),
      };
      console.info('[Cal Voice Lifecycle]', payload.diagnosis, payload);
      const body = JSON.stringify(payload);
      if (useBeacon && navigator.sendBeacon) {
        navigator.sendBeacon(apiUrl('/voice/benchmarks'), new Blob([body], { type: 'application/json' }));
      } else {
        fetch(apiUrl('/voice/benchmarks'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body,
          keepalive: true,
        }).catch(() => {});
      }
      if (final) voiceSessionMetrics = null;
    }

    async function requestVoiceProgressNarration(msg = {}) {
      const recentActivities = (voiceTurnMetrics?.activities || [])
        .filter(item => item.kind === 'step_started')
        .slice(-3);

      const response = await fetch(apiUrl('/voice/progress'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body: JSON.stringify({
          event: msg,
          recentActivities,
          style: 'calm-commentator',
        }),
      });
      return await readJsonResponse(response, 'Could not prepare voice progress narration');
    }

    async function maybeNarrateVoiceStep(msg = {}) {
      if (!voiceActive || !voiceAskInFlight || !voiceChannel || voiceChannel.readyState !== 'open') return;
      const sessionId = msg.sessionId || voiceBoundSessionId;
      if (sessionId && voiceBoundSessionId && sessionId !== voiceBoundSessionId) return;
      const key = `${msg.runId || ''}:${msg.tool || ''}:${msg.description || ''}`;
      if (voiceNarratedStepKeys.has(key)) return;
      const now = performance.now();
      if (now - voiceNarrationLastAt < VOICE_NARRATION_MIN_GAP_MS) return;
      try {
        const narration = await requestVoiceProgressNarration(msg);
        if (!narration?.shouldNarrate || !narration.instructions) return;
        voiceNarratedStepKeys.add(key);
        voiceNarrationLastAt = now;
        voiceResponseCoordinator.request({
          phase: 'progress',
          callId: msg.runId || '',
          waitForAudioStop: true,
          response: {
            instructions: narration.instructions,
          },
        });
        markVoiceMetric('narrationStarted', {
          activity: narration.activity?.description || msg.description || msg.tool || '',
          source: 'talkbox',
        });
      } catch (err) {
