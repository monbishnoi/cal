        console.warn('[Voice] narration failed:', err.message);
      }
    }

    function getVoiceAudioContext() {
      if (!voiceAudioContext) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) throw new Error('Web Audio is not supported in this browser.');
        voiceAudioContext = new AudioContext();
      }
      if (voiceAudioContext.state === 'suspended') {
        voiceAudioContext.resume().catch(() => {});
      }
      return voiceAudioContext;
    }

    function setVoiceWaveformMode(mode) {
      voiceWaveformMode = mode;
      voiceWaveform.classList.toggle('idle', mode === 'idle');
      voiceWaveform.classList.toggle('thinking', mode === 'thinking');
    }

    function resetVoiceBars() {
      voiceBarsResetToken += 1;
      setVoiceWaveformMode('idle');
      for (const bar of voiceBars) {
        bar.style.height = '8px';
        bar.style.opacity = '0.45';
        bar.style.transform = '';
      }
    }

    function settleVoiceBars(mode = 'idle') {
      voiceInputSpeaking = false;
      voiceBarsResetToken += 1;
      setVoiceWaveformMode(mode);
      for (const bar of voiceBars) {
        bar.style.height = '8px';
        bar.style.opacity = '0.45';
        bar.style.transform = '';
      }
    }

    function startMicWaveform(stream) {
      const runId = voiceMicWaveformRun + 1;
      voiceMicWaveformRun = runId;
      voiceWaveform.hidden = false;
      setVoiceWaveformMode('idle');
      const context = getVoiceAudioContext();
      const source = context.createMediaStreamSource(stream);
      voiceMicAnalyser = context.createAnalyser();
      voiceMicAnalyser.fftSize = 512;
      source.connect(voiceMicAnalyser);
      const data = new Uint8Array(voiceMicAnalyser.fftSize);
      const smoothedHeights = new Array(voiceBars.length).fill(10);
      const idleHeights = voiceBars.map((_, index) => (
        Math.max(6, 8 + Math.round(Math.sin(index * 0.82) * 1.5 + Math.cos(index * 0.47) * 1.2))
      ));
      let phase = 0;
      let quietFrames = 0;
      let localResetToken = voiceBarsResetToken;

      const draw = () => {
        if (!voiceMicAnalyser || runId !== voiceMicWaveformRun) return;
        if (localResetToken !== voiceBarsResetToken) {
          for (let i = 0; i < smoothedHeights.length; i += 1) {
            smoothedHeights[i] = idleHeights[i];
          }
          localResetToken = voiceBarsResetToken;
        }
        voiceMicAnalyser.getByteTimeDomainData(data);
        const bucketSize = Math.max(1, Math.floor(data.length / voiceBars.length));
        let totalSquares = 0;
        for (const value of data) {
          const centered = (value - 128) / 128;
          totalSquares += centered * centered;
        }
        const overallRms = Math.sqrt(totalSquares / data.length);
        const voiceSessionLive = voiceActive || voiceConnecting;
        const modeScale = 1;
        const isQuiet = !voiceSessionLive || overallRms < 0.018;
        quietFrames = isQuiet ? quietFrames + 1 : 0;
        phase += 0.22 + overallRms * 3.2;

        for (let i = 0; i < voiceBars.length; i += 1) {
          let sumSquares = 0;
          let peak = 0;
          for (let j = 0; j < bucketSize; j += 1) {
            const centered = ((data[i * bucketSize + j] || 128) - 128) / 128;
            const magnitude = Math.abs(centered);
            sumSquares += centered * centered;
            peak = Math.max(peak, magnitude);
          }
          const bucketRms = Math.sqrt(sumSquares / bucketSize);
          const position = voiceBars.length <= 1 ? 0 : i / (voiceBars.length - 1);
          const envelope = 0.72 + Math.sin(position * Math.PI) * 0.28;
          const motion = 1
            + Math.sin(phase + i * 0.92) * 0.2
            + Math.cos(phase * 0.7 + i * 1.63) * 0.12;
          const rawLevel = quietFrames > 4
            ? 0
            : Math.max(bucketRms * 11.5, peak * 4.2, overallRms * 2.8) * envelope * motion * modeScale;
          const level = Math.min(1, Math.max(0, rawLevel));
          const shapedLevel = Math.pow(level, 0.62);
          const targetHeight = voiceSessionLive ? Math.max(8, Math.round(8 + shapedLevel * 32)) : idleHeights[i];
          if (!voiceSessionLive) {
            smoothedHeights[i] = targetHeight;
          } else {
            const isFalling = targetHeight < smoothedHeights[i];
            const smoothing = isFalling ? 0.12 : (quietFrames > 4 ? 0.28 : 0.48);
            smoothedHeights[i] = smoothedHeights[i] * smoothing + targetHeight * (1 - smoothing);
          }
          const height = Math.round(smoothedHeights[i]);
          voiceBars[i].style.height = `${height}px`;
          const restingOpacity = voiceWaveformMode === 'thinking' ? 0.52 : 0.62;
          voiceBars[i].style.opacity = String(Math.max(restingOpacity, Math.min(1, restingOpacity + shapedLevel * 0.36)));
        }
        voiceMicRaf = requestAnimationFrame(draw);
      };

      draw();
    }

    function startRemoteGlow(stream) {
      const runId = voiceRemoteGlowRun + 1;
      voiceRemoteGlowRun = runId;
      const context = getVoiceAudioContext();
      const source = context.createMediaStreamSource(stream);
      voiceRemoteAnalyser = context.createAnalyser();
      voiceRemoteAnalyser.fftSize = 256;
      source.connect(voiceRemoteAnalyser);
      const data = new Uint8Array(voiceRemoteAnalyser.fftSize);

      const draw = () => {
        if (!voiceRemoteAnalyser || runId !== voiceRemoteGlowRun) return;
        voiceRemoteAnalyser.getByteTimeDomainData(data);
        let sum = 0;
        for (const value of data) {
          const centered = (value - 128) / 128;
          sum += centered * centered;
        }
        const rms = Math.sqrt(sum / data.length);
        if (rms > 0.025) {
          setVoiceSpeaking(true);
        } else if (voiceSpeaking && Date.now() - voiceSpeakingSince > 550) {
          setVoiceSpeaking(false);
        }
        voiceRemoteRaf = requestAnimationFrame(draw);
      };

      draw();
    }

    function waitForIceGatheringComplete(peer, timeoutMs = 2500) {
      if (peer.iceGatheringState === 'complete') return Promise.resolve();
      return new Promise(resolve => {
        const timeout = window.setTimeout(resolve, timeoutMs);
        const onStateChange = () => {
          if (peer.iceGatheringState !== 'complete') return;
          window.clearTimeout(timeout);
          peer.removeEventListener('icegatheringstatechange', onStateChange);
          resolve();
        };
        peer.addEventListener('icegatheringstatechange', onStateChange);
      });
    }

    function withTimeout(promise, timeoutMs, message) {
      return Promise.race([
        promise,
        new Promise((_, reject) => {
          window.setTimeout(() => reject(new Error(message)), timeoutMs);
        }),
      ]);
    }

    function sendVoiceEvent(event) {
      if (!voiceChannel || voiceChannel.readyState !== 'open') {
        throw new Error('Voice data channel is not open');
      }
      voiceChannel.send(JSON.stringify(event));
    }

    async function loadVoiceRuntimeConfig() {
      try {
        const response = await fetch(apiUrl('/voice/config'), { cache: 'no-store' });
        voiceRuntimeConfig = await readJsonResponse(response, 'Could not load voice configuration');
      } catch {
        voiceRuntimeConfig = { userName: '' };
      }
    }

    function sendVoiceSessionOpenNudge() {
      if (!voiceChannel || voiceChannel.readyState !== 'open' || voiceHasGreeted) return;
      voiceHasGreeted = true;
      createVoiceTranscriptTurn();
      const userName = normalizeMessageText(voiceRuntimeConfig.userName);
      voiceResponseCoordinator.request({
        phase: 'session_open',
        waitForAudioStop: true,
        response: {
          instructions: [
            'This voice connection is just beginning.',
            userName
              ? `Say one brief, warm greeting that includes the user's name exactly once: ${userName}.`
              : 'Say one brief, warm greeting.',
            'This is the only session-opening greeting. Do not repeat the greeting or user name.',
            'Keep it to one short sentence with no facts, answer, or second opener.',
          ].join(' '),
        },
      });
    }

    function createVoiceTranscriptTurn() {
      const turn = {
        id: `voice-transcript-${Date.now().toString(36)}-${++voiceTranscriptTurnSequence}`,
        sessionId: voiceBoundSessionId,
        voiceSessionId: voiceSessionMetrics?.id || null,
        usedAskAgent: false,
        inputs: new Map(),
        outputs: new Map(),
        inputWaiters: [],
        persisting: false,
      };
      activeVoiceTranscriptTurn = turn;
      return turn;
    }

    function getVoiceTranscriptTurn(event = {}) {
      return voiceTranscriptTurnsByResponseId.get(event.response_id || event.response?.id)
        || voiceTranscriptTurnsByInputId.get(event.item_id)
        || activeVoiceTranscriptTurn;
    }

    function rememberVoiceInputTranscript(event) {
      const turn = getVoiceTranscriptTurn(event) || createVoiceTranscriptTurn();
      const text = normalizeMessageText(event.transcript);
      if (!text) return;
      const sourceId = event.item_id || `${turn.id}-user`;
      turn.inputs.set(sourceId, text);
      for (const resolve of turn.inputWaiters.splice(0)) resolve();
    }

    function rememberVoiceOutputTranscript(event) {
      const turn = getVoiceTranscriptTurn(event) || createVoiceTranscriptTurn();
      const text = normalizeMessageText(event.transcript || event.text);
      if (!text) return;
      const sourceId = event.item_id || `${event.response_id || turn.id}-assistant-${event.content_index || 0}`;
      turn.outputs.set(sourceId, text);
    }

    function responseTranscriptTurns(event, turn) {
      const turns = [];
      for (const output of event.response?.output || []) {
        if (output?.type !== 'message' || output?.role !== 'assistant') continue;
        const text = normalizeMessageText((output.content || [])
          .map(part => part?.transcript || part?.text || '')
          .filter(Boolean)
          .join('\n'));
        if (text) turns.push([output.id || `${event.response.id}-assistant-${turns.length}`, text]);
      }
      return turns;
    }

    async function persistCompletedVoiceTurn(event) {
      const turn = getVoiceTranscriptTurn(event);
      if (!turn || turn.persisting || turn.usedAskAgent || event.response?.status !== 'completed') return;
      turn.persisting = true;

      if (turn.inputs.size === 0) {
        await new Promise(resolve => {
          const timer = window.setTimeout(resolve, 2000);
          turn.inputWaiters.push(() => {
            window.clearTimeout(timer);
            resolve();
          });
        });
      }
      if (turn.usedAskAgent) return;
      if (turn.outputs.size === 0) {
        for (const [sourceId, text] of responseTranscriptTurns(event, turn)) {
          turn.outputs.set(sourceId, text);
        }
      }

      const turns = [
        ...Array.from(turn.inputs, ([sourceId, text]) => ({ role: 'user', text, sourceId })),
        ...Array.from(turn.outputs, ([sourceId, text]) => ({ role: 'assistant', text, sourceId })),
      ];
      if (turns.length === 0 || !turn.sessionId) return;

      try {
        const response = await fetch(apiUrl('/voice/writeback'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
          body: JSON.stringify({
            sessionId: turn.sessionId,
            voiceSessionId: turn.voiceSessionId,
            turns,
          }),
        });
        const payload = await readJsonResponse(response, 'Could not save voice turn');
        for (const savedTurn of turns) {
          if (savedTurn.role === 'user') addVoiceUserMessage(savedTurn.text, turn.sessionId);
          else addVoiceAssistantMessage(savedTurn.text, turn.sessionId);
        }
        markVoiceMetric('voiceWritebackCompleted', {
          appended: payload.appended || 0,
          skipped: payload.skipped || 0,
        });
      } catch (err) {
        recordVoiceSessionEvent('voice_writeback_failed', { message: err.message });
      }
    }

    async function runVoiceAskAgentTool(call) {
      let args = {};
      try {
        args = JSON.parse(call.arguments || '{}');
      } catch (err) {
        throw new Error(`Incomplete voice tool arguments: ${err.message}`);
      }

      const request = String(args.request || '').trim();
      const mode = String(args.mode || 'answer').trim();
      if (!request) throw new Error('Incomplete voice tool arguments: missing request');

      const sessionId = voiceBoundSessionId;
      if (!sessionId) throw new Error('Voice is not bound to an active Cal session');
      voiceAskInFlight = true;
      markVoiceMetric('askAgentRequestReady', { mode, charCount: request.length });
      addVoiceUserMessage(request, sessionId);
      setStatus('busy', 'Voice checking');

      markVoiceMetric('askAgentFetchStart');
      const response = await fetch(apiUrl('/voice/ask-agent'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body: JSON.stringify({
          request,
          mode,
          contextId: sessionId || 'cal-pwa-voice',
          channel: 'voice',
          voiceSessionId: voiceSessionMetrics?.id || null,
        }),
      });
      const payload = await readJsonResponse(response, 'Could not reach Talkbox');
      const agentText = payload.agentText || payload.calText || payload.message || '';
      markVoiceMetric('askAgentFetchEnd', {
        status: response.status,
        agentElapsedMs: Number.isFinite(payload.elapsedMs) ? payload.elapsedMs : null,
        charCount: agentText.length,
      });
      addVoiceAssistantMessage(agentText, sessionId);
      markVoiceMetric('pwaVoiceAssistantRendered', { charCount: agentText.length });
      saveVoiceBenchmark('agent-answer-rendered');
      setStatus('online', voiceActive ? 'Voice ready' : 'Ready');
      return payload;
    }

    async function handleVoiceFunctionCall(call) {
      if (call.name !== 'ask_agent' && call.name !== 'ask_cal') return;
      if (handledVoiceToolCalls.has(call.call_id)) return;
      handledVoiceToolCalls.add(call.call_id);
      const transcriptTurn = getVoiceTranscriptTurn(call);
      if (transcriptTurn) transcriptTurn.usedAskAgent = true;
      markVoiceMetric('askAgentToolCallStarted', { callId: call.call_id || null });
      settleVoiceBars('thinking');

      try {
        const result = await runVoiceAskAgentTool(call);
        voiceAskInFlight = false;
        sendVoiceEvent({
          type: 'conversation.item.create',
          item: {
            type: 'function_call_output',
            call_id: call.call_id,
            output: JSON.stringify(result),
          },
        });
        voiceResponseCoordinator.request({
          phase: 'answer',
          callId: call.call_id,
          response: {
            instructions: 'Speak as Cal in first person. Use only the tool output for facts. The filler already opened this turn: do not add a greeting, acknowledgment, filler, bridge phrase, opener, or transition. Start directly with the first substantive new information. Do not say you are relaying to Cal, asking another brain, or talking to the agent. Mention that the full answer is visible in the chat only when helpful.',
          },
        });
      } catch (err) {
        markVoiceMetric('askAgentError', { message: err.message });
        voiceAskInFlight = false;
        saveVoiceBenchmark('agent-error');
        sendVoiceEvent({
          type: 'conversation.item.create',
          item: {
            type: 'function_call_output',
            call_id: call.call_id,
            output: JSON.stringify({ ok: false, error: err.message }),
          },
        });
        voiceResponseCoordinator.request({
          phase: 'error',
          callId: call.call_id,
          response: {
            instructions: 'Speak as Cal in first person. Do not add a greeting, acknowledgment, filler, bridge phrase, opener, or transition. Say there is a voice pipe issue reaching the runtime, and ask the user to try again. Do not invent the answer.',
          },
        });
      }
    }

    function queueVoiceFunctionCall(call) {
      if (
        handledVoiceToolCalls.has(call.call_id)
        || queuedVoiceToolCalls.some(queued => queued.call_id === call.call_id)
      ) return;
      const transcriptTurn = getVoiceTranscriptTurn(call);
      if (transcriptTurn) transcriptTurn.usedAskAgent = true;
      queuedVoiceToolCalls.push(call);
      voiceResponseCoordinator.requireActiveAudioStop(call.response_id);
      markVoiceMetric('askAgentToolCallQueued', { callId: call.call_id || null });
    }

    async function drainQueuedVoiceFunctionCall() {
      if (queuedVoiceToolCalls.length === 0) return false;
      const call = queuedVoiceToolCalls.shift();
      await handleVoiceFunctionCall(call);
      return true;
    }

    async function handleVoiceEvent(event) {
      if (event.type === 'session.created' || event.type === 'session.updated') {
        recordVoiceSessionEvent(event.type.replace('.', '_'), {
          realtimeSessionId: event.session?.id || null,
          realtimeModel: event.session?.model || null,
          realtimeVoice: event.session?.audio?.output?.voice || null,
          maxOutputTokens: event.session?.max_output_tokens ?? null,
        });
        return;
      }
      if (event.type === 'error') {
        voiceResponseCoordinator.handleError(event.error);
        recordVoiceSessionEvent('realtime_error', {
          errorType: event.error?.type || null,
          errorCode: event.error?.code || null,
          errorMessage: event.error?.message || null,
          errorEventId: event.error?.event_id || null,
        });
        return;
      }
      if (event.type === 'input_audio_buffer.speech_started') {
        createVoiceTranscriptTurn();
        startVoiceTurnMetrics('speech');
        markVoiceMetric('speechStarted');
        voiceInputSpeaking = true;
        setVoiceWaveformMode('listening');
        setStatus('busy', 'Listening');
        return;
      }
      if (event.type === 'input_audio_buffer.speech_stopped') {
        if (event.item_id && activeVoiceTranscriptTurn) {
          voiceTranscriptTurnsByInputId.set(event.item_id, activeVoiceTranscriptTurn);
        }
        markVoiceMetric('speechStopped');
        voiceInputSpeaking = false;
        setStatus('busy', 'Thinking');
        settleVoiceBars('thinking');
        return;
      }
      if (event.type === 'conversation.item.input_audio_transcription.completed') {
        rememberVoiceInputTranscript(event);
        return;
      }
      if (
        event.type === 'response.output_audio_transcript.done'
        || event.type === 'response.audio_transcript.done'
        || event.type === 'response.output_text.done'
      ) {
        rememberVoiceOutputTranscript(event);
        return;
      }
      if (event.type === 'response.created') {
        voiceResponseCoordinator.handleResponseCreated(event.response);
        if (event.response?.id && activeVoiceTranscriptTurn) {
          voiceTranscriptTurnsByResponseId.set(event.response.id, activeVoiceTranscriptTurn);
        }
        return;
      }
      if (event.type === 'output_audio_buffer.stopped') {
        voiceResponseCoordinator.handleAudioStopped(event.response_id);
        return;
      }
      if (event.type === 'response.audio.delta' || event.type === 'response.output_audio.delta') {
        markVoiceMetric('firstAudioDelta');
        setVoiceSpeaking(true);
        return;
      }
      if (
        event.type === 'response.done'
        || event.type === 'response.audio.done'
        || event.type === 'response.output_audio.done'
      ) {
        if (event.type === 'response.done') {
          voiceResponseCoordinator.handleResponseDone(event.response);
          void persistCompletedVoiceTurn(event);
          if (await drainQueuedVoiceFunctionCall()) return;
        }
        markVoiceMetric('responseDone', { eventType: event.type });
        if (!voiceAskInFlight && voiceTurnMetrics?.marks?.askAgentFetchEnd) {
          saveVoiceBenchmark('voice-response-done');
        }
        settleVoiceBars('idle');
        if (voiceActive) setStatus('online', 'Voice ready');
        return;
      }
      if (event.type === 'response.function_call_arguments.delta') {
        pendingVoiceToolArgs.set(
          event.call_id,
          `${pendingVoiceToolArgs.get(event.call_id) || ''}${event.delta || ''}`,
        );
        return;
      }
      if (event.type === 'response.function_call_arguments.done') {
        markVoiceMetric('askAgentArgumentsDone', { callId: event.call_id || null });
        queueVoiceFunctionCall({
          name: event.name,
          call_id: event.call_id,
          response_id: event.response_id,
          arguments: event.arguments || pendingVoiceToolArgs.get(event.call_id) || '',
        });
        return;
      }
      if (event.type === 'response.output_item.done' && event.item?.type === 'function_call' && event.item.arguments) {
        markVoiceMetric('askAgentArgumentsDone', { callId: event.item.call_id || null });
        queueVoiceFunctionCall({
          name: event.item.name,
          call_id: event.item.call_id,
          response_id: event.response_id,
          arguments: event.item.arguments,
        });
      }
    }

    function cleanupVoiceSession({
      restoreStatus = false,
      reason = 'cleanup',
      detail = {},
      persistLifecycle = true,
      preserveSessionState = false,
    } = {}) {
      if (persistLifecycle && voiceSessionMetrics) {
        persistVoiceSessionMetrics(reason, detail);
      }
      if (voiceDisconnectTimer) clearTimeout(voiceDisconnectTimer);
      voiceDisconnectTimer = null;
      voiceDisconnectedAt = null;
      if (voiceReconnectTimer) clearTimeout(voiceReconnectTimer);
      voiceReconnectTimer = null;
      voiceActive = false;
      voiceConnecting = false;
      if (voiceMicRaf) cancelAnimationFrame(voiceMicRaf);
      if (voiceRemoteRaf) cancelAnimationFrame(voiceRemoteRaf);
      voiceMicWaveformRun += 1;
      voiceRemoteGlowRun += 1;
      voiceMicRaf = null;
      voiceRemoteRaf = null;
      voiceMicAnalyser = null;
      voiceRemoteAnalyser = null;
      voiceInputSpeaking = false;
      voiceAskInFlight = false;
      resetVoiceBars();
      voiceWaveform.hidden = true;
      setVoiceSpeaking(false);

      if (voiceChannel) {
        const channel = voiceChannel;
        voiceChannel = null;
        try { channel.close(); } catch {}
      }
      if (voicePeer) {
        const peer = voicePeer;
        voicePeer = null;
        try { peer.close(); } catch {}
      }
      if (voiceMicStream) {
        for (const track of voiceMicStream.getTracks()) track.stop();
        voiceMicStream = null;
      }
      voiceAudio.pause();
      voiceAudio.removeAttribute('src');
      voiceAudio.srcObject = null;
      voiceResponseCoordinator.reset();
      pendingVoiceToolArgs.clear();
      handledVoiceToolCalls.clear();
      queuedVoiceToolCalls = [];
      voiceTranscriptTurnsByInputId.clear();
      voiceTranscriptTurnsByResponseId.clear();
      activeVoiceTranscriptTurn = null;
      voiceNarratedStepKeys.clear();
      if (!preserveSessionState) {
        voiceHasGreeted = false;
        voiceBoundSessionId = null;
        voiceReconnectAttempt = 0;
      }
      updateComposerAction();
      updateInputMeta();
      updateComposerSpace();
      if (restoreStatus) {
        setStatus(isProcessing ? 'busy' : 'online', isProcessing ? 'Working' : 'Ready');
      }
    }

    function stopVoiceSession() {
      cleanupVoiceSession({ restoreStatus: true, reason: 'manual_stop' });
      showToast('Voice stopped');
    }

    async function ensureCurrentPwaClient() {
      try {
        const response = await fetch(apiUrl(`/?cal-pwa-check=${Date.now()}`), { cache: 'no-store' });
        if (!response.ok) return true;
        const html = await response.text();
        const latestGeneration = html.match(/const PWA_CLIENT_GENERATION = '([^']+)'/)?.[1];
        if (!latestGeneration || latestGeneration === PWA_CLIENT_GENERATION) return true;

        showToast('Updating Cal before voice starts...');
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set('cal-pwa', latestGeneration);
        setTimeout(() => window.location.replace(nextUrl.toString()), 250);
        return false;
      } catch {
        return true;
      }
    }

    function scheduleVoiceReconnect(reason, detail = {}) {
      const sessionId = voiceBoundSessionId;
      const nextAttempt = voiceReconnectAttempt + 1;
      if (!sessionId || nextAttempt > VOICE_MAX_RECONNECT_ATTEMPTS) {
        cleanupVoiceSession({ restoreStatus: true, reason, detail });
        showToast('Voice connection lost. Tap the microphone to reconnect.');
        return;
      }

      recordVoiceSessionEvent('voice_reconnect_scheduled', {
        reason,
        attempt: nextAttempt,
        maxAttempts: VOICE_MAX_RECONNECT_ATTEMPTS,
        delayMs: VOICE_RECONNECT_DELAY_MS,
      });
      cleanupVoiceSession({
        reason,
        detail,
        preserveSessionState: true,
      });
      voiceReconnectAttempt = nextAttempt;
      voiceConnecting = true;
      setStatus('busy', `Reconnecting voice (${nextAttempt}/${VOICE_MAX_RECONNECT_ATTEMPTS})`);
      updateComposerAction();
      updateInputMeta();
      voiceReconnectTimer = setTimeout(() => {
        voiceReconnectTimer = null;
        void startVoiceSession({
          reconnect: true,
          sessionId,
          attempt: nextAttempt,
        });
      }, VOICE_RECONNECT_DELAY_MS);
    }

    async function startVoiceSession({
      reconnect = false,
      sessionId: requestedSessionId = null,
      attempt = 0,
    } = {}) {
      if (!navigator.mediaDevices?.getUserMedia) {
        showToast('Microphone is not supported in this browser.');
        return;
      }
      if (!await ensureCurrentPwaClient()) return;

      const sessionId = requestedSessionId || activeSessionId;
      if (!sessionId || !sessions.has(sessionId)) {
        showToast('Open an active Cal session before starting voice.');
        return;
      }

      cleanupVoiceSession({
        reason: reconnect ? 'reset_before_reconnect' : 'reset_before_start',
        preserveSessionState: reconnect,
      });
      await loadVoiceRuntimeConfig();
      voiceBoundSessionId = sessionId;
      if (reconnect) voiceReconnectAttempt = attempt;
      startVoiceSessionMetrics();
      voiceConnecting = true;
      updateComposerAction();
      updateInputMeta();
      setStatus('busy', 'Connecting voice');
      if (reconnect) {
        setStatus('busy', `Reconnecting voice (${attempt}/${VOICE_MAX_RECONNECT_ATTEMPTS})`);
        recordVoiceSessionEvent('voice_reconnect_attempt_started', {
          attempt,
          maxAttempts: VOICE_MAX_RECONNECT_ATTEMPTS,
        });
      }
      recordVoiceSessionEvent('microphone_request_started');

      let peer = null;
      try {
        voiceMicStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recordVoiceSessionEvent('microphone_acquired', {
          trackCount: voiceMicStream.getAudioTracks().length,
        });
        for (const track of voiceMicStream.getAudioTracks()) {
          track.addEventListener('ended', () => {
            if (!voiceSessionMetrics || !voiceMicStream?.getTracks().includes(track)) return;
            recordVoiceSessionEvent('microphone_track_ended', { trackState: track.readyState });
            cleanupVoiceSession({ restoreStatus: true, reason: 'microphone_track_ended' });
          });
          track.addEventListener('mute', () => recordVoiceSessionEvent('microphone_track_muted'));
          track.addEventListener('unmute', () => recordVoiceSessionEvent('microphone_track_unmuted'));
        }
        startMicWaveform(voiceMicStream);

        peer = new RTCPeerConnection();
        voicePeer = peer;
        recordVoiceSessionEvent('peer_created', {}, peer, null);
        peer.onconnectionstatechange = async () => {
          if (voicePeer !== peer) return;
          recordVoiceSessionEvent('peer_connection_state', { state: peer.connectionState }, peer, voiceChannel);
          if (peer.connectionState === 'disconnected') {
            await recordVoiceTransportStats('peer_disconnected_stats', peer, voiceChannel);
            if (voicePeer !== peer || peer.connectionState !== 'disconnected') return;
            setStatus('busy', 'Reconnecting voice');
            if (!voiceDisconnectTimer) {
              voiceDisconnectedAt = performance.now();
              recordVoiceSessionEvent('peer_disconnect_grace_started', {
                graceMs: VOICE_DISCONNECT_GRACE_MS,
              }, peer, voiceChannel);
              voiceDisconnectTimer = setTimeout(() => {
                voiceDisconnectTimer = null;
                if (voicePeer !== peer || peer.connectionState !== 'disconnected') return;
                recordVoiceSessionEvent('peer_disconnect_timeout', {
                  outageMs: Math.round(performance.now() - voiceDisconnectedAt),
                }, peer, voiceChannel);
                scheduleVoiceReconnect('peer_disconnect_timeout');
              }, VOICE_DISCONNECT_GRACE_MS);
            }
            return;
          }
          if (voiceDisconnectTimer && peer.connectionState === 'connected') {
            clearTimeout(voiceDisconnectTimer);
            voiceDisconnectTimer = null;
            await recordVoiceTransportStats('peer_reconnected_stats', peer, voiceChannel);
            if (voicePeer !== peer) return;
            recordVoiceSessionEvent('peer_reconnected', {
              outageMs: voiceDisconnectedAt === null
                ? null
                : Math.round(performance.now() - voiceDisconnectedAt),
            }, peer, voiceChannel);
            voiceDisconnectedAt = null;
            setStatus('online', 'Voice ready');
          }
          if (['failed', 'closed'].includes(peer.connectionState)) {
            if (voiceDisconnectTimer) {
              clearTimeout(voiceDisconnectTimer);
              voiceDisconnectTimer = null;
            }
            await recordVoiceTransportStats(`peer_${peer.connectionState}_stats`, peer, voiceChannel);
            if (voicePeer !== peer) return;
            if (voiceActive || voiceConnecting) {
              scheduleVoiceReconnect(`peer_${peer.connectionState}`);
            }
          }
        };
        peer.oniceconnectionstatechange = () => {
          if (voicePeer !== peer) return;
          recordVoiceSessionEvent('ice_connection_state', { state: peer.iceConnectionState }, peer, voiceChannel);
        };
        peer.onicegatheringstatechange = () => {
          if (voicePeer !== peer) return;
          recordVoiceSessionEvent('ice_gathering_state', { state: peer.iceGatheringState }, peer, voiceChannel);
        };
        peer.onsignalingstatechange = () => {
          if (voicePeer !== peer) return;
          recordVoiceSessionEvent('signaling_state', { state: peer.signalingState }, peer, voiceChannel);
        };
        peer.onicecandidateerror = (event) => {
          if (voicePeer !== peer) return;
          recordVoiceSessionEvent('ice_candidate_error', {
            errorCode: event.errorCode || null,
            errorText: event.errorText || null,
            url: event.url || null,
          }, peer, voiceChannel);
        };
        peer.ontrack = (event) => {
          if (voicePeer !== peer) return;
          const stream = event.streams[0];
          recordVoiceSessionEvent('remote_track_received', {
            kind: event.track?.kind || null,
            trackState: event.track?.readyState || null,
          }, peer, voiceChannel);
          event.track?.addEventListener('ended', () => {
            recordVoiceSessionEvent('remote_track_ended', { trackState: event.track.readyState }, peer, voiceChannel);
          });
          event.track?.addEventListener('mute', () => recordVoiceSessionEvent('remote_track_muted', {}, peer, voiceChannel));
          event.track?.addEventListener('unmute', () => recordVoiceSessionEvent('remote_track_unmuted', {}, peer, voiceChannel));
          voiceAudio.srcObject = stream;
          startRemoteGlow(stream);
          voiceAudio.play().catch(err => {
            showToast(err.message || 'Voice playback failed.');
          });
        };

        const channel = peer.createDataChannel('oai-events');
        voiceChannel = channel;
        recordVoiceSessionEvent('data_channel_created', {}, peer, channel);
        channel.onopen = () => {
          if (voicePeer !== peer || voiceChannel !== channel) return;
          voiceActive = true;
          voiceConnecting = false;
          const recoveredAttempt = voiceReconnectAttempt;
          recordVoiceSessionEvent('data_channel_open', {
            reconnectAttempt: recoveredAttempt || null,
          }, peer, channel);
          if (recoveredAttempt) {
            recordVoiceSessionEvent('voice_reconnect_succeeded', {
              attempt: recoveredAttempt,
            }, peer, channel);
            voiceReconnectAttempt = 0;
          }
          setStatus('online', 'Voice ready');
          updateComposerAction();
          updateInputMeta();
          sendVoiceSessionOpenNudge();
        };
        channel.onclose = () => {
          if (voiceChannel !== channel) return;
          recordVoiceSessionEvent('data_channel_close', {}, peer, channel);
          scheduleVoiceReconnect('data_channel_closed');
        };
        channel.onerror = (event) => {
          recordVoiceSessionEvent('data_channel_error', {
            errorName: event.error?.name || null,
            errorMessage: event.error?.message || null,
            errorDetail: event.error?.errorDetail || null,
            sctpCauseCode: event.error?.sctpCauseCode || null,
          }, peer, channel);
          showToast('Voice channel error.');
        };
        channel.onmessage = async ({ data }) => {
          if (voiceChannel !== channel) return;
          try {
            await handleVoiceEvent(JSON.parse(data));
          } catch (err) {
            recordVoiceSessionEvent('data_channel_message_error', {
              errorName: err.name || null,
              errorMessage: err.message || String(err),
            }, peer, channel);
            showToast(err.message || 'Voice event failed.');
          }
        };

        for (const track of voiceMicStream.getTracks()) {
          peer.addTrack(track, voiceMicStream);
        }

        const offer = await peer.createOffer();
        recordVoiceSessionEvent('offer_created', {}, peer, channel);
        await peer.setLocalDescription(offer);
        recordVoiceSessionEvent('local_description_set', {}, peer, channel);
        await waitForIceGatheringComplete(peer);
        recordVoiceSessionEvent('ice_gathering_complete', {}, peer, channel);
        if (voicePeer !== peer) return;
        recordVoiceSessionEvent('session_request_started', {}, peer, channel);
        const voiceSessionPath = '/voice/session?sessionId=' + encodeURIComponent(voiceBoundSessionId);
        const response = await fetch(apiUrl(voiceSessionPath), {
          method: 'POST',
          headers: { 'Content-Type': 'application/sdp' },
          body: peer.localDescription.sdp,
        });
        const answer = await response.text();
        recordVoiceSessionEvent('session_response_received', { status: response.status }, peer, channel);
        if (!response.ok) {
          const setupError = new Error(answer || 'Voice session failed.');
          setupError.retryable = response.status >= 500;
          throw setupError;
        }
        if (voicePeer !== peer) return;
        await withTimeout(
          peer.setRemoteDescription({ type: 'answer', sdp: answer }),
          10000,
          'Voice remote SDP timed out.',
        );
        recordVoiceSessionEvent('remote_description_set', {}, peer, channel);
      } catch (err) {
        // A stopped or replaced startup must not overwrite the newer UI state.
        if (peer && voicePeer !== peer) return;
        const retryable = err.retryable
          || err.name === 'TypeError'
          || /timed out|not respond|not reachable/i.test(err.message || '');
        if (retryable && voiceBoundSessionId) {
          scheduleVoiceReconnect(reconnect ? 'reconnect_setup_error' : 'setup_error', {
            errorName: err.name || null,
            errorMessage: err.message || String(err),
          });
          return;
        }
        cleanupVoiceSession({
          reason: 'setup_error',
          detail: {
            errorName: err.name || null,
            errorMessage: err.message || String(err),
          },
        });
        setStatus('error', 'Voice error');
        showToast(err.message || 'Could not start voice.');
      }
    }

    function toggleVoiceSession() {
      if (voiceActive || voiceConnecting) {
        stopVoiceSession();
        return;
      }
      startVoiceSession();
    }

    async function readJsonResponse(response, fallbackMessage) {
      const text = await response.text();
      let data = null;

      if (text.trim()) {
        try {
          data = JSON.parse(text);
        } catch {
          data = null;
        }
      }

      if (!response.ok) {
        const detail = data?.error || text.trim() || response.statusText || fallbackMessage;
        const error = new Error(detail);
        error.data = data;
        throw error;
      }

      if (!text.trim()) return {};
      if (!data) {
        throw new Error(fallbackMessage + ': server returned non-JSON text');
      }
      return data;
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function scrollActiveSessionToBottom() {
      requestAnimationFrame(() => {
        scrollToBottom();
      });
    }

    function setEmptyVisible(isVisible) {
      emptyState.hidden = !isVisible;
    }

    function addMessage(text, role, options = {}) {
      setEmptyVisible(false);
      const view = getSessionView(options.sessionId || activeSessionId);
      const row = document.createElement('article');
      row.className = 'message ' + role + (options.pending ? ' pending' : '') + (options.preReset ? ' pre-reset' : '');
      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      if (role === 'assistant') {
        bubble.innerHTML = options.pending ? (text ? escapeHtml(text) : '') : renderMarkdown(text);
      } else if (options.imageUrl || options.attachments?.length) {
        const wrap = document.createElement('div');
        wrap.className = 'message-attachment';
        const attachment = (options.attachments || []).find(item => item?.type === 'image');
        const image = document.createElement('img');
        image.className = 'message-image';
        image.src = options.imageUrl || attachment?.dataUrl || '';
        image.alt = options.imageName || attachment?.filename || 'Attached image';
        wrap.appendChild(image);
        if (text) {
          const label = document.createElement('div');
          label.className = 'message-text';
          label.textContent = text;
          wrap.appendChild(label);
        }
        bubble.appendChild(wrap);
      } else {
        bubble.textContent = text;
      }

      row.appendChild(bubble);
      view.container.appendChild(row);
      updateEmptyState();
      if (view.id === viewIdFor(activeSessionId)) scrollToBottom();
      return row;
    }

    function clearMessages(sessionId = activeSessionId) {
      const view = getSessionView(sessionId);
      [...view.container.querySelectorAll('.message, .session-divider')].forEach(node => node.remove());
      view.pendingBubble = null;
      view.activityFeed = null;
      updateEmptyState();
    }

    function autoSizeInput() {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 132) + 'px';
      updateInputMeta();
      updateComposerAction();
      updateComposerSpace();
    }

    function formatBytes(bytes) {
      if (bytes >= 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1).replace(/\.0$/, '') + ' MB';
      if (bytes >= 1024) return Math.round(bytes / 1024) + ' KB';
      return bytes + ' B';
    }

    function clearAttachment(options = {}) {
      const revoke = options.revoke !== false;
      if (revoke && selectedImageUrl) {
        URL.revokeObjectURL(selectedImageUrl);
      }
      selectedImage = null;
      selectedImageUrl = null;
      fileInput.value = '';
      attachmentThumb.removeAttribute('src');
      attachmentName.textContent = '';
      attachmentSize.textContent = '';
      attachmentPreview.hidden = true;
      autoSizeInput();
    }

    function setSelectedImage(file) {
      if (!file) return;
      if (!SUPPORTED_IMAGE_TYPES.has(file.type)) {
        showToast('Use JPEG, PNG, GIF, or WebP.');
        fileInput.value = '';
        return;
      }
      if (file.size > MAX_IMAGE_BYTES) {
        showToast('Image must be 5 MB or less.');
        fileInput.value = '';
        return;
      }

      clearAttachment();
      selectedImage = file;
      selectedImageUrl = URL.createObjectURL(file);
      attachmentThumb.src = selectedImageUrl;
      attachmentThumb.alt = file.name || 'Selected image';
      attachmentName.textContent = file.name || 'Selected image';
      attachmentSize.textContent = `${file.type.replace('image/', '').toUpperCase()} · ${formatBytes(file.size)}`;
      attachmentPreview.hidden = false;
      autoSizeInput();
    }

    function updateInputMeta() {
      inputMeta.textContent = '';
      inputMeta.classList.remove('warning');
    }

    // --- Event Listeners ---
    composer.addEventListener('submit', event => {
      event.preventDefault();
      sendMessage();
    });

    input.addEventListener('input', autoSizeInput);
    input.addEventListener('keydown', event => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    attachBtn.addEventListener('click', () => {
      if (attachBtn.disabled) return;
      fileInput.click();
    });

    fileInput.addEventListener('change', () => {
      setSelectedImage(fileInput.files?.[0]);
    });

    removeAttachment.addEventListener('click', () => {
      clearAttachment();
      input.focus({ preventScroll: true });
    });

    refreshBtn.addEventListener('click', () => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'sync', sessionId: activeSessionId }));
      } else {
        loadHistoryHttp(activeSessionId);
      }
      showToast('Session refreshed');
    });

    topAddStrandBtn.addEventListener('click', createStrand);

    window.addEventListener('online', () => {
      recordVoiceSessionEvent('browser_online');
      setStatus('online', 'Online');
      wsConnect();
    });

    window.addEventListener('offline', () => {
      recordVoiceSessionEvent('browser_offline');
      setStatus('error', 'Offline');
    });

    // Presence: notify Cal when tab visibility changes
    document.addEventListener('visibilitychange', () => {
      const status = document.hidden ? 'away' : 'active';
      recordVoiceSessionEvent('visibility_changed', { state: document.visibilityState });
      if (document.hidden && voiceSessionMetrics) {
        persistVoiceSessionMetrics('visibility_hidden', {}, { final: false, useBeacon: true });
      }
      wsSend({ type: 'presence', status });
    });

    window.addEventListener('pagehide', () => {
      if (voiceSessionMetrics) {
        persistVoiceSessionMetrics('pagehide', {}, { final: false, useBeacon: true });
      }
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
          .then(registration => registration.update())
          .catch(() => {});
      });
    }

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const raw = atob(base64);
      const arr = new Uint8Array(raw.length);
      for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
      return arr;
    }

    async function setupPushNotifications() {
      if (!('Notification' in window) || !('PushManager' in window)) {
        console.warn('[Push] Not supported on this browser/context');
        return;
      }

      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        console.warn('[Push] Permission denied or dismissed');
        return;
      }

      const reg = await navigator.serviceWorker.ready;
      let sub = await reg.pushManager.getSubscription();
      if (sub) {
        console.log('[Push] Already subscribed');
        return;
      }

      try {
        const vapidRes = await fetch('/api/push/vapid-public-key');
        if (!vapidRes.ok) return;
        const { key } = await vapidRes.json();

        sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(key),
        });

        await fetch('/api/push/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(sub),
        });
        console.log('[Push] Subscribed successfully');
      } catch (err) {
        console.warn('[Push] Subscription failed:', err.message);
      }
    }

    // On iOS, notification permission must be triggered by user gesture.
    // On desktop, we can request automatically.
    function showPushBanner() {
      if (!('Notification' in window) || !('PushManager' in window)) return;
      if (Notification.permission === 'granted') {
        setupPushNotifications();
        return;
      }
      if (Notification.permission === 'denied') return;
      // Permission not yet decided — request it (works on desktop, not iOS over HTTP)
      setupPushNotifications();
    }

    // Run after SW activates
    navigator.serviceWorker?.ready.then(() => showPushBanner());

    // --- Boot ---
    loadSessions();
    wsConnect();
    autoSizeInput();
  </script>
</body>
</html>
